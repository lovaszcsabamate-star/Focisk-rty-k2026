name: Apply step 15 deck selection domain

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-15-deck-selection-domain'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-15-deck-selection-domain
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-15-deck-selection-domain.mjs
      - name: Szintaktikai ellenőrzés
        run: |
          node --check js/domain/deck-selection-domain.js
          node --check js/deck-selection.js
          node --check test/deck-selection-domain.test.mjs
      - name: Pakliválasztási domain tesztje
        id: domain_test
        continue-on-error: true
        run: node test/deck-selection-domain.test.mjs > deck-selection-domain-test.log 2>&1
      - name: Domainteszt diagnosztika mentése
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step-15-deck-selection-domain-test
          path: deck-selection-domain-test.log
          if-no-files-found: error
      - name: Domainteszt eredményének érvényesítése
        if: steps.domain_test.outcome != 'success'
        run: |
          cat deck-selection-domain-test.log
          exit 1
      - name: Régi importútvonal regressziója
        run: node test/deck-selection.test.mjs
      - name: Assetlicenc-audit
        run: node scripts/audit-assets.mjs
      - name: Standalone build
        run: npm run build:standalone
      - name: Statikus regresszió
        run: node test/static.test.mjs
      - name: Standalone játékmotor regresszió
        run: node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          git checkout HEAD -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json
          rm scripts/apply-step-15-deck-selection-domain.mjs
          rm .github/workflows/apply-step-15-deck-selection-domain.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "15. lépés: pakliválasztási domainlogika leválasztása"
          git push origin HEAD:refactor/step-15-deck-selection-domain
