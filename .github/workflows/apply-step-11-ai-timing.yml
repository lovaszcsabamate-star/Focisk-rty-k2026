name: Apply step 11 AI timing integration

on:
  push:
    branches:
      - refactor/step-11-ai-timing-service
    paths:
      - scripts/apply-step-11-ai-timing.mjs
      - .github/workflows/apply-step-11-ai-timing.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-11-ai-timing.mjs
      - name: Célzott ellenőrzések
        run: |
          node --check js/services/turn-timing-service.js
          node --check js/main.js
          node --check js/mobile-experience.js
          node test/turn-timing-service.test.mjs
          node test/ai-turn-speed.test.mjs
      - name: Integráció commitolása
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "11. lépés: globális timerpatch kiváltása explicit szolgáltatással"
          git push
