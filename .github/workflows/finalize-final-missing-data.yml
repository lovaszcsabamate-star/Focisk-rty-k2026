name: Végső adatlezárás integrációja

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'data/final-missing-data-completion'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: data/final-missing-data-completion
          fetch-depth: 0
      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Függőségek telepítése
        run: npm install
      - name: Végső integráció alkalmazása
        run: node scripts/finalize-final-missing-data.mjs
      - name: Szintaktikai ellenőrzés
        run: npm run lint
      - name: Önálló build és adatbázis-audit
        run: npm run build
      - name: Végső adatlezárási teszt
        run: npm run test:final-missing
      - name: Teljes tesztcsomag
        run: npm test
      - name: Módosítások mentése
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nincs mentendő módosítás."
          else
            git commit -m "A teljes NB I-adatbázis végső lezárása [final-data-wired]"
            git push origin HEAD:data/final-missing-data-completion
          fi
