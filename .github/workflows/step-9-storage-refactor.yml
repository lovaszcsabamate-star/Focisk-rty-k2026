name: 9. lépés storage-integráció

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-storage:
    if: github.head_ref == 'refactor/step-9-storage-configuration' || github.ref_name == 'refactor/step-9-storage-configuration'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-9-storage-configuration
          fetch-depth: 0

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Storage-fogyasztók központosítása
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          def read(path): return Path(path).read_text(encoding='utf-8')
          def write(path, content): Path(path).write_text(content, encoding='utf-8')
          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Nem található cserepont: {label}')
              return text.replace(old, new, 1)

          # Pakliválasztás
          path = 'js/deck-selection.js'
          source = read(path)
          source = replace_once(source,
            '/** Deck filtering and menu controls shared by both game modes. */\n\n',
            "/** Deck filtering and menu controls shared by both game modes. */\n\nimport { STORAGE_KEYS } from './app/configuration.js';\nimport { readStoredJson, writeStoredJson } from './services/storage-service.js';\n\n",
            'deck imports')
          source = replace_once(source,
            "export const DECK_SELECTION_STORAGE_KEY = 'fociskartyak:deck-selection:v1';\nexport const SAVED_MATCH_STORAGE_KEY = 'fociskartyak:saved-match:v2';",
            'export const DECK_SELECTION_STORAGE_KEY = STORAGE_KEYS.deckSelection;\nexport const SAVED_MATCH_STORAGE_KEY = STORAGE_KEYS.savedMatch;',
            'deck keys')
          source = re.sub(
            r"export function readDeckSelection\(players = \[\]\) \{.*?\n\}",
            "export function readDeckSelection(players = []) {\n  const parsed = readStoredJson(DECK_SELECTION_STORAGE_KEY, RANDOM_DECK_SELECTION);\n  return validateDeckSelection(players, parsed).selection;\n}",
            source, count=1, flags=re.S)
          source = re.sub(
            r"export function saveDeckSelection\(selection\) \{.*?\n\}",
            "export function saveDeckSelection(selection) {\n  return writeStoredJson(DECK_SELECTION_STORAGE_KEY, normaliseDeckSelection(selection));\n}",
            source, count=1, flags=re.S)
          write(path, source)

          # Mobilélmény, beállítások és mentés
          path = 'js/mobile-experience.js'
          source = read(path)
          source = replace_once(source,
            '/** Mobile-first experience helpers layered on top of the existing game UI. */\n\n',
            "/** Mobile-first experience helpers layered on top of the existing game UI. */\n\nimport {\n  DEFAULT_EXPERIENCE_SETTINGS,\n  SAVED_MATCH_VERSION,\n  STORAGE_KEYS as APP_STORAGE_KEYS,\n  settingStorageKey,\n} from './app/configuration.js';\nimport {\n  readStoredBoolean, readStoredJson, removeStoredValue, writeStoredBoolean, writeStoredJson,\n} from './services/storage-service.js';\n",
            'mobile imports')
          source = re.sub(
            r"export const STORAGE_KEYS = \{.*?\n\};\n\nexport const DEFAULT_SETTINGS = Object\.freeze\(\{.*?\n\}\);\n\nconst readStorage = .*?\n\};\n\nconst writeStorage = .*?\n\};",
            "export const STORAGE_KEYS = Object.freeze({\n  save: APP_STORAGE_KEYS.savedMatch,\n  onboarding: APP_STORAGE_KEYS.onboardingComplete,\n});\n\nexport const DEFAULT_SETTINGS = DEFAULT_EXPERIENCE_SETTINGS;",
            source, count=1, flags=re.S)
          source = re.sub(
            r"export const loadBooleanSetting = .*?;\n\nexport const saveBooleanSetting = .*?;",
            "export const loadBooleanSetting = (key, fallback) => readStoredBoolean(settingStorageKey(key), fallback);\n\nexport const saveBooleanSetting = (key, value) => writeStoredBoolean(settingStorageKey(key), value);",
            source, count=1, flags=re.S)
          source = replace_once(source,
            "  return readStorage(STORAGE_KEYS.onboarding) === 'true';",
            '  return readStoredBoolean(STORAGE_KEYS.onboarding, false);',
            'onboarding read')
          source = replace_once(source,
            '  writeStorage(STORAGE_KEYS.onboarding, String(Boolean(value)));',
            '  writeStoredBoolean(STORAGE_KEYS.onboarding, value);',
            'onboarding write')
          source = re.sub(
            r"export function readSavedMatch\(\) \{.*?\n\}",
            "export function readSavedMatch() {\n  const parsed = readStoredJson(STORAGE_KEYS.save, null);\n  if (parsed?.version !== SAVED_MATCH_VERSION || !parsed?.game || !['classic', 'penalties'].includes(parsed.mode)) return null;\n  return parsed;\n}",
            source, count=1, flags=re.S)
          source = replace_once(source, '      version: 2,', '      version: SAVED_MATCH_VERSION,', 'save version')
          source = replace_once(source,
            '    return writeStorage(STORAGE_KEYS.save, JSON.stringify(snapshot));',
            '    return writeStoredJson(STORAGE_KEYS.save, snapshot);',
            'save write')
          source = re.sub(
            r"export function clearSavedMatch\(\) \{.*?\n\}",
            "export function clearSavedMatch() {\n  return removeStoredValue(STORAGE_KEYS.save);\n}",
            source, count=1, flags=re.S)
          write(path, source)

          # Reliability réteg
          path = 'js/reliability-fixes.js'
          source = read(path)
          source = replace_once(source,
            "import './mobile-experience.js';\n",
            "import './mobile-experience.js';\nimport { STORAGE_KEYS } from './app/configuration.js';\nimport { readStoredString } from './services/storage-service.js';\n",
            'reliability imports')
          source = replace_once(source,
            "export const SAVED_MATCH_STORAGE_KEY = 'fociskartyak:saved-match:v2';",
            'export const SAVED_MATCH_STORAGE_KEY = STORAGE_KEYS.savedMatch;',
            'reliability key')
          source = replace_once(source,
            '    const opponentId = savedOpponentIdFromRawSave(localStorage.getItem(SAVED_MATCH_STORAGE_KEY));',
            '    const opponentId = savedOpponentIdFromRawSave(readStoredString(SAVED_MATCH_STORAGE_KEY));',
            'reliability read')
          write(path, source)

          # Játékosprofil
          path = 'js/player-profile.js'
          source = read(path)
          source = replace_once(source,
            "import { UI } from './ui.js';\n",
            "import { STORAGE_KEYS } from './app/configuration.js';\nimport { readStoredString, removeStoredValue, writeStoredString } from './services/storage-service.js';\nimport { UI } from './ui.js';\n",
            'profile imports')
          source = replace_once(source,
            "export const PLAYER_NAME_STORAGE_KEY = 'fociskartyak:player-name:v1';",
            'export const PLAYER_NAME_STORAGE_KEY = STORAGE_KEYS.playerName;',
            'profile key')
          source = re.sub(
            r"const readStoredName = \(\) => \{.*?\n\};",
            'const readStoredName = () => readStoredString(PLAYER_NAME_STORAGE_KEY);',
            source, count=1, flags=re.S)
          source = re.sub(
            r"  try \{\n    if \(normalized\).*?\n  \} catch \{.*?\n  \}",
            "  if (normalized) writeStoredString(PLAYER_NAME_STORAGE_KEY, normalized);\n  else removeStoredValue(PLAYER_NAME_STORAGE_KEY);",
            source, count=1, flags=re.S)
          write(path, source)

          # Ellenfélválasztás
          path = 'js/opponents.js'
          source = read(path)
          source = replace_once(source,
            "import { DIFFICULTY } from './ai.js';\n",
            "import { STORAGE_KEYS } from './app/configuration.js';\nimport { readStoredString, writeStoredString } from './services/storage-service.js';\nimport { DIFFICULTY } from './ai.js';\n",
            'opponents imports')
          source = replace_once(source,
            "const STORAGE_KEY = 'fociskartyak:opponent';",
            'const STORAGE_KEY = STORAGE_KEYS.selectedOpponent;',
            'opponents key')
          source = re.sub(
            r"function loadSelectedOpponent\(\) \{.*?\n\}",
            "function loadSelectedOpponent() {\n  const stored = readStoredString(STORAGE_KEY);\n  return stored && byId.has(stored) ? stored : 'd-raven';\n}",
            source, count=1, flags=re.S)
          source = replace_once(source,
            "  try { localStorage.setItem(STORAGE_KEY, id); } catch { /* optional */ }",
            '  writeStoredString(STORAGE_KEY, id);',
            'opponents write')
          write(path, source)

          # Vizuális beállítások biztonsági mentése
          path = 'js/visual-settings-persistence.js'
          source = read(path)
          source = replace_once(source,
            '(() => {\n',
            "import { STORAGE_KEYS } from './app/configuration.js';\nimport { readStoredJson, removeStoredValue, writeStoredJson } from './services/storage-service.js';\n\n(() => {\n",
            'visual persistence imports')
          source = replace_once(source,
            "  const STORAGE_KEY = 'fociskartyak.visual-settings.v1';\n  const SIZING_BACKUP_KEY = 'fociskartyak.visual-sizing.v1';",
            '  const STORAGE_KEY = STORAGE_KEYS.visualSettings;\n  const SIZING_BACKUP_KEY = STORAGE_KEYS.visualSizingBackup;',
            'visual persistence keys')
          source = re.sub(
            r"  function readJson\(key\) \{.*?\n  \}\n\n  function writeJson\(key, value\) \{.*?\n  \}",
            "  const readJson = key => readStoredJson(key, null);\n  const writeJson = (key, value) => writeStoredJson(key, value);",
            source, count=1, flags=re.S)
          source = re.sub(
            r"        try \{\n          localStorage\.removeItem\(SIZING_BACKUP_KEY\);\n        \} catch \{.*?\n        \}",
            '        removeStoredValue(SIZING_BACKUP_KEY);',
            source, count=1, flags=re.S)
          write(path, source)

          # Vizuális rendszer
          path = 'js/visual-system.js'
          source = read(path)
          source = replace_once(source,
            '(() => {\n',
            "import { STORAGE_KEYS } from './app/configuration.js';\nimport { readStoredJson, writeStoredJson } from './services/storage-service.js';\n\n(() => {\n",
            'visual system imports')
          source = replace_once(source,
            "  const STORAGE_KEY = 'fociskartyak.visual-settings.v1';",
            '  const STORAGE_KEY = STORAGE_KEYS.visualSettings;',
            'visual system key')
          source = re.sub(
            r"  function loadSettings\(\) \{.*?\n  \}",
            "  function loadSettings() {\n    const parsed = readStoredJson(STORAGE_KEY, {});\n    return { ...DEFAULTS, ...(parsed && typeof parsed === 'object' ? parsed : {}) };\n  }",
            source, count=1, flags=re.S)
          source = re.sub(
            r"  function saveSettings\(\) \{.*?\n  \}",
            '  function saveSettings() {\n    writeStoredJson(STORAGE_KEY, settings);\n  }',
            source, count=1, flags=re.S)
          write(path, source)

          # Standalone sorrend
          path = 'scripts/build-standalone.mjs'
          source = read(path)
          marker = "  'js/branding.js',"
          if "'js/app/configuration.js'" not in source:
              source = replace_once(source, marker,
                "  'js/app/configuration.js',\n  'js/services/storage-service.js',\n" + marker,
                'standalone modules')
          write(path, source)

          # PWA-cache
          path = 'sw.js'
          source = read(path)
          source = re.sub(
            r"// Korábbi cache-verziók: fociskartyak-2026-v30 \.\.\. fociskartyak-2026-v\d+\nconst PWA_CACHE = 'fociskartyak-2026-v\d+';",
            "// Korábbi cache-verziók: fociskartyak-2026-v30 ... fociskartyak-2026-v54\nconst PWA_CACHE = 'fociskartyak-2026-v55';",
            source, count=1)
          marker = "  './js/branding.js',"
          if "'./js/app/configuration.js'" not in source:
              source = replace_once(source, marker,
                "  './js/app/configuration.js',\n  './js/services/storage-service.js',\n" + marker,
                'PWA modules')
          write(path, source)

          # Package scriptek
          path = 'package.json'
          package = json.loads(read(path))
          scripts = package['scripts']
          scripts['test:storage-service'] = 'node test/storage-service.test.mjs'
          lint = scripts['lint']
          if 'node --check js/app/configuration.js' not in lint:
              lint = lint.replace('node --check js/bootstrap.js', 'node --check js/app/configuration.js && node --check js/services/storage-service.js && node --check js/bootstrap.js')
          if 'node --check test/storage-service.test.mjs' not in lint:
              lint = lint.replace('node --check test/category-registry.test.mjs', 'node --check test/storage-service.test.mjs && node --check test/category-registry.test.mjs')
          scripts['lint'] = lint
          for key in ('test', 'test:all'):
              if 'node test/storage-service.test.mjs' not in scripts[key]:
                  scripts[key] = scripts[key].replace('node test/category-registry.test.mjs', 'node test/storage-service.test.mjs && node test/category-registry.test.mjs')
          write(path, json.dumps(package, ensure_ascii=False, indent=2) + '\n')
          PY

      - name: Célzott ellenőrzés
        run: |
          npm run lint
          npm run test:storage-service
          node test/deck-selection.test.mjs
          node test/player-profile.test.mjs
          node test/categories.test.mjs
          npm run build:standalone
          node test/standalone-game-runtime.test.mjs

      - name: Integráció commitolása
        run: |
          rm .github/workflows/step-9-storage-refactor.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git add js package.json scripts/build-standalone.mjs sw.js
          git commit -m "9. lépés: központi storage-szolgáltatás bekötése"
          git push origin HEAD:refactor/step-9-storage-configuration
