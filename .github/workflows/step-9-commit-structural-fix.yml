name: 9. lépés storage-szerkezeti javítás commit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-fix:
    if: github.head_ref == 'refactor/step-9-storage-configuration' || github.ref_name == 'refactor/step-9-storage-configuration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/step-9-storage-configuration
          fetch-depth: 0
      - name: Szerkezeti javítóblokk futtatása
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          workflow = Path('.github/workflows/step-9-final-structural-fix.yml').read_text(encoding='utf-8')
          match = re.search(r"          python - <<'PY'\n(.*?)\n          PY", workflow, re.S)
          if not match:
              raise SystemExit('A szerkezeti javítóblokk nem található.')
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in match.group(1).splitlines())
          exec(compile(code, 'step-9-structural-fix.py', 'exec'), {})
          PY
      - name: Javítás commitolása
        run: |
          rm -f .github/workflows/step-9-diagnostic.yml
          rm -f .github/workflows/step-9-diagnostic-artifact.yml
          rm -f .github/workflows/step-9-final-structural-fix.yml
          rm -f .github/workflows/step-9-commit-structural-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/deck-selection.js scripts/build-standalone.mjs test/visual-system.test.mjs
          git add -u .github/workflows
          git commit -m "9. lépés: storage-szerződés és standalone build véglegesítése"
          git push origin HEAD:refactor/step-9-storage-configuration
