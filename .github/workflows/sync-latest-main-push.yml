name: Legfrissebb main teljes integrációja

on:
  push:
    branches:
      - stabilize-beta-2026-07-22
    paths:
      - .github/workflows/sync-latest-main-push.yml

permissions:
  contents: write

concurrency:
  group: fociskartyak-latest-main-integration
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilize-beta-2026-07-22
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Legfrissebb main és új források átvétele
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- \
            js/bootstrap.js \
            js/deck-selection.js \
            js/penalties.js \
            scripts/postprocess-standalone.mjs \
            data/club-official-enrichment-23-final-missing-basic.json \
            test/deck-selection.test.mjs \
            test/final-missing-complete.test.mjs \
            test/rules.test.mjs

      - name: Stabilizációs és vizuális rétegek integrálása
        run: |
          python scripts/sync-main-once.py
          python scripts/fix-central-name-export-once.py
          python scripts/sync-visual-main-once.py
          python scripts/sync-usability-main-once.py
          python scripts/fix-visual-tests-once.py
          python scripts/fix-visual-performance-once.py
          python scripts/fix-mobile-carousel-once.py
          python scripts/fix-carousel-e2e-once.py
          python scripts/fix-hand-inspector-e2e-once.py
          python scripts/fix-selection-smoke-once.py

      - name: Pakliválasztás bekötése a kiadási útvonalakba
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path('.')
          package_path = root / 'package.json'
          package = json.loads(package_path.read_text(encoding='utf-8'))
          scripts = package['scripts']
          postprocess = 'node scripts/postprocess-standalone.mjs'
          for name in ('build', 'build:standalone', 'audit:data', 'review:database'):
              if postprocess not in scripts[name]:
                  scripts[name] = f"{scripts[name]} && {postprocess}"
          for check in (
              'node --check js/deck-selection.js',
              'node --check scripts/postprocess-standalone.mjs',
              'node --check test/deck-selection.test.mjs',
          ):
              if check not in scripts['lint']:
                  scripts['lint'] += f' && {check}'
          for name in ('test', 'test:all'):
              deck_test = 'node test/deck-selection.test.mjs'
              if deck_test not in scripts[name]:
                  marker = 'node test/rules.test.mjs'
                  scripts[name] = scripts[name].replace(marker, f'{deck_test} && {marker}', 1)
          package['version'] = '1.1.0'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          lock_path = root / 'package-lock.json'
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          lock['version'] = '1.1.0'
          if isinstance(lock.get('packages', {}).get(''), dict):
              lock['packages']['']['version'] = '1.1.0'
          lock_path.write_text(json.dumps(lock, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          sw_path = root / 'sw.js'
          sw = sw_path.read_text(encoding='utf-8')
          entry = "  './js/deck-selection.js',"
          if entry not in sw:
              sw = sw.replace("  './js/main.js',", entry + "\n  './js/main.js',", 1)
          sw_path.write_text(sw, encoding='utf-8')

          test_path = root / 'test/stabilization.test.mjs'
          test = test_path.read_text(encoding='utf-8')
          if "const deckSelectionSource = text('js/deck-selection.js');" not in test:
              test += """

          const deckSelectionSource = text('js/deck-selection.js');
          assert.match(deckSelectionSource, /MIN_FILTERED_DECK_SIZE = 11/);
          assert.match(text('js/bootstrap.js'), /applyDeckSelectionToPayload/);
          assert.match(text('js/penalties.js'), /PENALTY_TEAM_SIZE = 11/);
          assert.match(text('scripts/postprocess-standalone.mjs'), /standalone deck selection bootstrap/);
          assert.match(text('sw.js'), /js\\/deck-selection\\.js/);
          assert.match(text('package.json'), /test\\/deck-selection\\.test\\.mjs/);
          """
              test_path.write_text(test, encoding='utf-8')
          PY

      - name: Függőségek és Chromium telepítése
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Lint és assetlicenc-audit
        run: |
          npm run lint
          npm run audit:assets

      - name: Standalone build
        run: npm run build

      - name: Alap- és teljes regressziós tesztek
        run: |
          npm test
          npm run test:all

      - name: Mobil Chrome-smoke tesztek
        run: |
          node scripts/mobile-layout-smoke.mjs
          node scripts/mobile-selection-smoke.mjs
          node scripts/mobile-phase-smoke.mjs

      - name: Gyors Klasszikus E2E kapu
        run: CI= npx playwright test test/e2e/mobile-layout.spec.mjs --grep "mobil Klasszikus mód"

      - name: Teljes Playwright játékmenet
        run: CI= npx playwright test test/e2e/mobile-layout.spec.mjs

      - name: Runtime és asztali előnézetek
        run: |
          npm run test:runtime
          npm run preview:desktop

      - name: Determinisztikus standalone és formázás
        shell: bash
        run: |
          set -euo pipefail
          before="$(sha256sum Fociskartyak2026.html | cut -d' ' -f1)"
          npm run build
          after="$(sha256sum Fociskartyak2026.html | cut -d' ' -f1)"
          test "$before" = "$after"
          git diff --check

      - name: Végleges forrás commit és main-előzmények összehangolása
        shell: bash
        run: |
          set -euo pipefail
          rm -rf playwright-report test-results previews
          rm -f mobile-layout-report.json runtime-browser-report.json
          rm -f test-artifacts/integration-*.log
          rm -f .github/workflows/sync-main-once.yml
          rm -f .github/workflows/merge-main-once.yml
          rm -f .github/workflows/finalize-integration-push.yml
          rm -f .github/workflows/sync-latest-main-push.yml
          rm -f scripts/sync-main-once.py
          rm -f scripts/sync-visual-main-once.py
          rm -f scripts/sync-usability-main-once.py
          rm -f scripts/fix-central-name-export-once.py
          rm -f scripts/fix-visual-tests-once.py
          rm -f scripts/fix-visual-performance-once.py
          rm -f scripts/fix-mobile-carousel-once.py
          rm -f scripts/fix-carousel-e2e-once.py
          rm -f scripts/fix-hand-inspector-e2e-once.py
          rm -f scripts/fix-selection-smoke-once.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Véglegesíti a stabil bétát a legfrissebb main fejlesztéseivel'
          git merge -s ours origin/main -m 'Összehangolja a stabil bétát a legfrissebb main ággal'
          git push origin HEAD:stabilize-beta-2026-07-22

      - name: Teszttermékek feltöltése
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-main-integration-artifacts
          if-no-files-found: warn
          retention-days: 30
          path: |
            test-artifacts/
            playwright-report/
            mobile-layout-report.json
            runtime-browser-report.json
