name: Ikonos Android APK

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-icon-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Java beállítása
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Függőségek
        run: npm ci
      - name: Mobil webcsomag
        run: npm run mobile:prepare
      - name: Android projekt
        run: npx cap add android
      - name: Ikonkészlet
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          node scripts/apply-android-icon.mjs
      - name: APK fordítása
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: APK előkészítése
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/Fociskartyak-2026-PR56-ikonnal.apk
      - name: APK feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: Fociskartyak-2026-PR56-ikonnal
          path: dist/Fociskartyak-2026-PR56-ikonnal.apk
          if-no-files-found: error
          retention-days: 30
