name: Apply step 18 menu controller

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-18-menu-controller'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-18-menu-controller
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: |
          node scripts/apply-step-18-menu-controller.mjs
          node scripts/patch-step-18-static-test.mjs
      - name: Szintaktikai ellenőrzés
        run: |
          node --check js/app/menu-controller.js
          node --check js/main.js
          node --check test/menu-controller.test.mjs
          node --check test/static.test.mjs
      - name: Menüvezérlő regressziós tesztje
        run: |
          set +e
          node test/menu-controller.test.mjs > /tmp/menu-controller-test.txt 2>&1
          status=$?
          cat /tmp/menu-controller-test.txt
          if [ "$status" -ne 0 ]; then
            cp /tmp/menu-controller-test.txt menu-controller-test-error.txt
            git config user.name "lovaszcsabamate-star"
            git config user.email "lovaszcsabamate-star@users.noreply.github.com"
            git add -f menu-controller-test-error.txt
            git commit -m "18. lépés: menüvezérlő teszthiba diagnosztikája"
            git push origin HEAD:refactor/step-18-menu-controller
            exit "$status"
          fi
      - name: Session-életciklus regresszió
        run: node test/session-lifecycle-service.test.mjs
      - name: Pakliválasztó UI-regresszió
        run: node test/deck-selection-menu-component.test.mjs
      - name: Játékruntime regresszió
        run: node test/game-runtime.test.mjs
      - name: Assetlicenc-audit
        run: node scripts/audit-assets.mjs
      - name: Standalone build
        run: npm run build:standalone
      - name: Statikus regresszió
        run: node test/static.test.mjs
      - name: Standalone játékmotor regresszió
        run: node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          git checkout HEAD -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json \
            previews/selection-phase-desktop.png
          rm scripts/apply-step-18-menu-controller.mjs
          rm scripts/patch-step-18-static-test.mjs
          rm .github/workflows/apply-step-18-menu-controller.yml
          rm -f menu-controller-test-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "18. lépés: központi menüvezérlő leválasztása"
          git push origin HEAD:refactor/step-18-menu-controller
