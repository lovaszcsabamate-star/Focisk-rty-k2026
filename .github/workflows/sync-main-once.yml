name: Main fejlesztések ellenőrzött átvétele

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - scripts/sync-main-once.py
      - scripts/sync-visual-main-once.py
      - .github/workflows/sync-main-once.yml

permissions:
  contents: write

concurrency:
  group: fociskartyak-main-sync-once
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'stabilize-beta-2026-07-22'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilize-beta-2026-07-22
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Friss main lekérése
        run: git fetch origin main
      - name: Main fejlesztések portolása
        run: |
          python scripts/sync-main-once.py
          python scripts/sync-visual-main-once.py
      - name: Függőségek telepítése
        run: npm ci
      - name: Chromium telepítése
        run: npx playwright install --with-deps chromium
      - name: Szintaxis- és lintellenőrzés
        run: npm run lint
      - name: Assetlicenc-ellenőrzés
        run: npm run audit:assets
      - name: Standalone build
        run: npm run build
      - name: Alaptesztek
        run: npm test
      - name: Teljes regressziós tesztcsomag
        run: npm run test:all
      - name: Mobil- és Playwright-tesztek
        run: npm run test:mobile-layout
      - name: Futásidejű böngészőteszt
        run: npm run test:runtime
      - name: Asztali fáziselőnézetek
        run: npm run preview:desktop
      - name: Git formázási ellenőrzés
        run: git diff --check
      - name: Ellenőrzött változások commitolása
        shell: bash
        run: |
          set -euo pipefail
          rm -rf playwright-report test-results previews
          rm -f mobile-layout-report.json runtime-browser-report.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Átvezeti a main vizuális, mobil- és jogi javításait a stabil bétába'
          git push origin HEAD:stabilize-beta-2026-07-22
      - name: Teszttermékek feltöltése
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-sync-artifacts
          if-no-files-found: warn
          retention-days: 30
          path: |
            test-artifacts/
            previews/
            playwright-report/
            mobile-layout-report.json
            runtime-browser-report.json
