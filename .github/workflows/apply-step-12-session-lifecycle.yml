name: Apply step 12 Session lifecycle integration

on:
  push:
    branches:
      - refactor/step-12-session-lifecycle-service
    paths:
      - scripts/apply-step-12-session-lifecycle.mjs
      - .github/workflows/apply-step-12-session-lifecycle.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-12-session-lifecycle.mjs
      - name: Célzott ellenőrzések
        run: |
          node --check js/app/session-lifecycle-service.js
          node --check js/main.js
          node test/session-lifecycle-service.test.mjs
          node test/turn-timing-service.test.mjs
          npm run build:standalone
          node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          rm scripts/apply-step-12-session-lifecycle.mjs
          rm .github/workflows/apply-step-12-session-lifecycle.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "12. lépés: Session lifecycle szolgáltatás bekötése"
          git push
