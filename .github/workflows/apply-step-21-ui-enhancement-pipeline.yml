name: Apply step 21 UI enhancement pipeline

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-21-ui-enhancement-pipeline'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-21-ui-enhancement-pipeline
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-21-ui-enhancement-pipeline.mjs
      - name: Szintaktikai ellenőrzés
        run: |
          node --check js/ui/ui-enhancement-pipeline.js
          node --check js/bootstrap.js
          node --check test/ui-enhancement-pipeline.test.mjs
      - name: UI pipeline regressziós tesztje
        run: node test/ui-enhancement-pipeline.test.mjs
      - name: UI komponens regresszió
        run: node test/ui-components.test.mjs
      - name: Mobil és inspector regresszió
        run: |
          node test/interface-regression.test.mjs
          node test/accessibility-polish.test.mjs
          node test/focus-experience.test.mjs
      - name: Játékruntime regresszió
        run: node test/game-runtime.test.mjs
      - name: Assetlicenc-audit
        run: node scripts/audit-assets.mjs
      - name: Standalone build
        run: npm run build:standalone
      - name: Statikus regresszió
        run: node test/static.test.mjs
      - name: Standalone játékmotor regresszió
        run: node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          git checkout HEAD -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json \
            previews/selection-phase-desktop.png
          rm scripts/apply-step-21-ui-enhancement-pipeline.mjs
          rm .github/workflows/apply-step-21-ui-enhancement-pipeline.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "21. lépés: explicit UI enhancement pipeline"
          git push origin HEAD:refactor/step-21-ui-enhancement-pipeline
