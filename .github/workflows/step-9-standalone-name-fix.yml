name: 9. lépés standalone storage-név javítása

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-name:
    if: github.head_ref == 'refactor/step-9-storage-configuration' || github.ref_name == 'refactor/step-9-storage-configuration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/step-9-storage-configuration
          fetch-depth: 0
      - name: Kanonikus belső név bevezetése
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path('js/app/configuration.js')
          source = config.read_text(encoding='utf-8')
          source = source.replace('export const STORAGE_KEYS = Object.freeze({', 'export const APP_STORAGE_KEYS = Object.freeze({', 1)
          source = source.replace('  storageKeys: STORAGE_KEYS,', '  storageKeys: APP_STORAGE_KEYS,', 1)
          source = source.replace(
            'export function settingStorageKey(settingName) {',
            'export { APP_STORAGE_KEYS as STORAGE_KEYS };\n\nexport function settingStorageKey(settingName) {',
            1,
          )
          config.write_text(source, encoding='utf-8')

          files = [
            'js/deck-selection.js',
            'js/reliability-fixes.js',
            'js/player-profile.js',
            'js/opponents.js',
            'js/visual-settings-persistence.js',
            'js/visual-system.js',
          ]
          for name in files:
            path = Path(name)
            text = path.read_text(encoding='utf-8')
            text = text.replace("import { STORAGE_KEYS } from './app/configuration.js';", "import { APP_STORAGE_KEYS } from './app/configuration.js';")
            text = text.replace('STORAGE_KEYS.deckSelection', 'APP_STORAGE_KEYS.deckSelection')
            text = text.replace('STORAGE_KEYS.savedMatch', 'APP_STORAGE_KEYS.savedMatch')
            text = text.replace('STORAGE_KEYS.playerName', 'APP_STORAGE_KEYS.playerName')
            text = text.replace('STORAGE_KEYS.selectedOpponent', 'APP_STORAGE_KEYS.selectedOpponent')
            text = text.replace('STORAGE_KEYS.visualSettings', 'APP_STORAGE_KEYS.visualSettings')
            text = text.replace('STORAGE_KEYS.visualSizingBackup', 'APP_STORAGE_KEYS.visualSizingBackup')
            path.write_text(text, encoding='utf-8')

          mobile = Path('js/mobile-experience.js')
          text = mobile.read_text(encoding='utf-8')
          text = text.replace('  STORAGE_KEYS as APP_STORAGE_KEYS,', '  APP_STORAGE_KEYS,')
          mobile.write_text(text, encoding='utf-8')

          test = Path('test/storage-service.test.mjs')
          text = test.read_text(encoding='utf-8')
          text = text.replace('  APP_CONFIGURATION,\n', '  APP_CONFIGURATION,\n  APP_STORAGE_KEYS,\n')
          text = text.replace('  STORAGE_KEYS,\n', '  STORAGE_KEYS,\n')
          text = text.replace('assert.equal(APP_CONFIGURATION.storageKeys, STORAGE_KEYS);', 'assert.equal(APP_CONFIGURATION.storageKeys, APP_STORAGE_KEYS);\nassert.equal(STORAGE_KEYS, APP_STORAGE_KEYS);')
          text = text.replace('STORAGE_KEYS.sounds ?? BOOLEAN_SETTING_KEYS.sounds', 'BOOLEAN_SETTING_KEYS.sounds')
          text = text.replace('Object.values(STORAGE_KEYS)', 'Object.values(APP_STORAGE_KEYS)')
          test.write_text(text, encoding='utf-8')
          PY
      - name: Ellenőrzés
        run: |
          npm run lint
          npm run test:storage-service
          npm run build:standalone
          node test/standalone-game-runtime.test.mjs
      - name: Javítás commitolása
        run: |
          rm .github/workflows/step-9-standalone-name-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git add js test/storage-service.test.mjs
          git commit -m "9. lépés: standalone storage-névütközés megszüntetése"
          git push origin HEAD:refactor/step-9-storage-configuration
