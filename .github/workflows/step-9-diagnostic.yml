name: 9. lépés storage-tesztdiagnosztika

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'refactor/step-9-storage-configuration' || github.ref_name == 'refactor/step-9-storage-configuration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/step-9-storage-configuration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Célzott tesztnapló elkészítése
        run: |
          {
            echo '=== npm run test:storage-service ==='
            npm run test:storage-service
            echo
            echo '=== node test/deck-selection.test.mjs ==='
            node test/deck-selection.test.mjs
            echo
            echo '=== node test/player-profile.test.mjs ==='
            node test/player-profile.test.mjs
            echo
            echo '=== npm test ==='
            npm test
          } > step9-diagnostic.log 2>&1 || true
      - name: Napló commitolása
        run: |
          rm .github/workflows/step-9-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git add step9-diagnostic.log
          git commit -m "9. lépés: célzott storage-tesztdiagnosztika"
          git push origin HEAD:refactor/step-9-storage-configuration
