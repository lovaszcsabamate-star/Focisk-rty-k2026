name: Apply step 14 asset service

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-14-asset-service'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-14-asset-service
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-14-asset-service.mjs
      - name: Célzott ellenőrzések
        run: |
          node --check js/services/asset-service.js
          node --check js/branding.js
          node --check js/ui/dom-primitives.js
          node --check js/ui/card-component.js
          node test/asset-service.test.mjs
          node scripts/audit-assets.mjs
          npm run build:standalone
          node test/ui-components.test.mjs
          node test/static.test.mjs
          node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          git checkout HEAD -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json
          rm scripts/apply-step-14-asset-service.mjs
          rm .github/workflows/apply-step-14-asset-service.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "14. lépés: központi asset-service bekötése"
          git push origin HEAD:refactor/step-14-asset-service
