name: Gameflow hardening

on:
  push:
    branches:
      - fix/gameflow-hardening-2026-07-22
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gameflow-hardening-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize transactional session controller
        shell: bash
        run: |
          if compgen -G '.hardening/main.gz.part*' > /dev/null; then
            cat .hardening/main.gz.part* | base64 --decode | gzip -dc > js/main.js
            echo 'd3a175c7872bb678430ab2c5ab506dcaa0158c684ab4210acfd5c82a93ff800b  js/main.js' | sha256sum --check --strict
            node --check js/main.js
            rm -rf .hardening

            if [[ '${{ github.event_name }}' == 'push' ]]; then
              git config user.name 'github-actions[bot]'
              git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              git add js/main.js .hardening
              git commit -m 'Tranzakcióbiztossá teszi a játékfolyamot' || true
              git push
            fi
          fi

      - name: Refresh migrated regression contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('test/eto-complete.test.mjs'): [
                  ("assert.match(readText('../sw.js'), /fociskartyak-2026-v30/);",
                   "const serviceWorker = readText('../sw.js');\nassert.match(serviceWorker, /const CACHE_PREFIX = 'fociskartyak-2026-';/);\nassert.match(serviceWorker, /const PWA_CACHE = `\\$\\{CACHE_PREFIX\\}v43`;/);"),
              ],
              Path('test/interface-regression.test.mjs'): [
                  ("assert.match(reliabilityJs, /RELIABILITY_LEGACY_OPPONENT_IDS/);",
                   "assert.match(reliabilityJs, /normalizeLegacyOpponentId/);"),
                  ("assert.match(serviceWorker, /const PWA_CACHE = 'fociskartyak-2026-v42';/);",
                   "assert.match(serviceWorker, /const CACHE_PREFIX = 'fociskartyak-2026-';/);\nassert.match(serviceWorker, /const PWA_CACHE = `\\$\\{CACHE_PREFIX\\}v43`;/);"),
              ],
              Path('test/static.test.mjs'): [
                  ("assert.match(matchdayJs, /KÖVETKEZŐ VÁLASZTÓ/);",
                   "assert.match(matchdayJs, /matchdayScoreboardStatus/);\nassert.match(matchdayJs, /KATEGÓRIÁT VÁLASZT/);"),
                  ("assert.match(mobileExperienceJs, /kevesebb életkor a jobb/);",
                   "assert.match(mobileExperienceJs, /comparisonDirectionInstruction/);\nassert.match(mobileExperienceJs, /case 'lower': return 'A kisebb érték a jobb'/);"),
                  ("assert.match(serviceWorker, /fociskartyak-2026-v30/);",
                   "assert.match(serviceWorker, /const CACHE_PREFIX = 'fociskartyak-2026-';/);\nassert.match(serviceWorker, /const PWA_CACHE = `\\$\\{CACHE_PREFIX\\}v43`;/);"),
                  ("assert.match(main, /Penalties mód/);",
                   "assert.doesNotMatch(main, /Penalties mód|Tizenegyes mód/);\nassert.match(main, /Büntetőpárbaj/);"),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              updated = text
              for old, new in pairs:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
          PY

          if [[ '${{ github.event_name }}' == 'push' ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add test/eto-complete.test.mjs test/interface-regression.test.mjs test/static.test.mjs
            git commit -m 'Frissíti a regressziós szerződéseket az új architektúrához' || true
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inventory fixed cache-version expectations
        shell: bash
        run: grep -RInE 'fociskartyak-2026-v[0-9]+' test > stale-cache-expectations.log || true

      - name: Upload cache-expectation inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stale-cache-expectations-${{ github.run_id }}
          path: stale-cache-expectations.log
          if-no-files-found: ignore

      - name: Lint
        run: npm run lint

      - name: Unit and regression tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee npm-test.log

      - name: Upload unit-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameflow-unit-test-log-${{ github.run_id }}
          path: npm-test.log
          if-no-files-found: ignore

      - name: Full test suite
        shell: bash
        run: |
          set -o pipefail
          npm run test:all 2>&1 | tee test-all.log

      - name: Upload full-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameflow-full-test-log-${{ github.run_id }}
          path: test-all.log
          if-no-files-found: ignore

      - name: Standalone build
        run: npm run build

      - name: Database review
        run: npm run review:database

      - name: Mobile layout regression
        run: npm run test:mobile-layout

      - name: Capacitor web assets preparation
        run: npm run mobile:prepare

      - name: Verify standalone HTML and hardening invariants
        shell: bash
        run: |
          test -s Fociskartyak2026.html
          grep -q 'Büntetőpárbaj' Fociskartyak2026.html
          grep -q 'fociskartyak-2026-' sw.js
          if grep -q 'globalThis.setTimeout[[:space:]]*=' js/mobile-experience.js; then
            echo 'A globális setTimeout felülírása visszakerült.' >&2
            exit 1
          fi
          test -d mobile-www/assets
          test -f mobile-www/index.html

      - name: Commit generated standalone HTML
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Fociskartyak2026.html
          git commit -m 'Frissíti az önálló Fociskártyák HTML-buildet' || true
          git push
