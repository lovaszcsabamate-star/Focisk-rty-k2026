name: Ellenőrzés és önálló build

on:
  push:
    branches:
      - main
      - ux/felhasznalobarat-jatekmenet
      - visual-unification-legal-assets
    paths-ignore:
      - Fociskartyak2026.html
      - mobile-layout-report.json
      - previews/*.png
      - data/enrichment-audit.json
      - data/players-reviewed.json
      - data/database-review.json
      - data/database-review.md
      - data/database-changelog.json
      - data/missing-player-data-reviewed.json
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Szintaktikai ellenőrzés
        run: npm run lint

      - name: Assetlicenc-ellenőrzés
        run: npm run audit:assets

      - name: Önálló HTML és teljes adatfelülvizsgálat elkészítése
        run: npm run build

      - name: Adatbázis-felülvizsgálati parancs
        run: npm run review:database

      - name: Valódi Chrome mobilnézeti ellenőrzés
        id: mobile_layout
        continue-on-error: true
        run: npm run test:mobile-layout

      - name: Asztali fáziselőnézetek elkészítése
        run: npm run preview:desktop

      - name: Mobil- és asztali előnézetek mentése
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-layout-report-and-previews
          path: |
            mobile-layout-report.json
            previews/*.png
          if-no-files-found: warn
          retention-days: 30

      - name: Alkalmazástesztek
        run: npm test

      - name: Teljes tesztcsomag
        run: npm run test:all

      - name: Formázási hibák ellenőrzése
        run: git diff --check

      - name: Mobilnézeti eredmény érvényesítése
        if: steps.mobile_layout.outcome == 'failure'
        run: exit 1

      - name: Generált játékfájl, riport és előnézetek mentése
        if: github.event_name == 'push'
        run: |
          GENERATED_FILES="Fociskartyak2026.html mobile-layout-report.json previews/*.png data/enrichment-audit.json data/players-reviewed.json data/database-review.json data/database-review.md data/database-changelog.json data/missing-player-data-reviewed.json"
          if git diff --quiet -- $GENERATED_FILES; then
            echo "Az önálló játékfájl, a riportok és az előnézetek naprakészek."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $GENERATED_FILES
          git commit -m "Önálló build, vizuális előnézetek és audit frissítése [skip ci]"
          git push
