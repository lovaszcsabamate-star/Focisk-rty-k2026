name: Ellenőrzés és önálló build

on:
  push:
    branches:
      - main
      - ux/felhasznalobarat-jatekmenet
    paths-ignore:
      - Fociskartyak2026.html
      - data/enrichment-audit.json
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Szintaktikai ellenőrzés
        run: npm run lint

      - name: Önálló HTML és audit elkészítése
        run: npm run build

      - name: Ideiglenes ETO–Puskás audit mentése
        if: github.event_name == 'pull_request'
        run: |
          cp data/enrichment-audit.json data/eto-puskas-debug-audit.json
          if git diff --quiet -- data/eto-puskas-debug-audit.json; then
            echo "Az ideiglenes audit már naprakész."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/eto-puskas-debug-audit.json
            git commit -m "Ideiglenes ETO-Puskas audit [skip ci]"
            git push
          fi

      - name: Alkalmazástesztek
        run: npm test

      - name: Teljes tesztcsomag
        run: npm run test:all

      - name: Formázási hibák ellenőrzése
        run: git diff --check

      - name: Generált játékfájl és audit mentése
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- Fociskartyak2026.html data/enrichment-audit.json; then
            echo "Az önálló játékfájl és az audit naprakész."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Fociskartyak2026.html data/enrichment-audit.json
          git commit -m "Önálló játékfájl és adat-audit frissítése [skip ci]"
          git push
