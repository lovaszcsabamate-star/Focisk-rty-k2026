name: Ellenőrzés és önálló build

on:
  push:
    branches:
      - main
      - ux/felhasznalobarat-jatekmenet
      - visual-unification-legal-assets
    paths-ignore:
      - Fociskartyak2026.html
      - mobile-layout-report.json
      - runtime-browser-report.json
      - previews/*.png
      - data/enrichment-audit.json
      - data/players-reviewed.json
      - data/database-review.json
      - data/database-review.md
      - data/database-changelog.json
      - data/missing-player-data-reviewed.json
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Szintaktikai ellenőrzés
        run: npm run lint

      - name: Assetlicenc-ellenőrzés
        run: npm run audit:assets

      - name: Önálló HTML és teljes adatfelülvizsgálat elkészítése
        run: npm run build

      - name: Adatbázis-felülvizsgálati parancs
        run: npm run review:database

      - name: Valódi Chrome mobilnézeti ellenőrzés
        id: mobile_layout
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:mobile-layout 2>&1 | tee mobile-layout-test-output.log

      - name: Klasszikus és Büntetőpárbaj futásidejű böngészőteszt
        id: runtime_browser
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:runtime 2>&1 | tee runtime-browser-test-output.log

      - name: Asztali fáziselőnézetek elkészítése
        id: desktop_previews
        continue-on-error: true
        run: |
          set -o pipefail
          npm run preview:desktop 2>&1 | tee desktop-preview-output.log

      - name: Alkalmazástesztek
        id: app_tests
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee application-test-output.log

      - name: Teljes tesztcsomag
        id: full_tests
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:all 2>&1 | tee full-test-output.log

      - name: Mobil- és asztali előnézetek, tesztnaplók mentése
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-layout-report-previews-and-tests
          path: |
            mobile-layout-report.json
            runtime-browser-report.json
            previews/*.png
            *-output.log
          if-no-files-found: warn
          retention-days: 30

      - name: Formázási hibák ellenőrzése
        run: git diff --check

      - name: Mobilnézeti eredmény érvényesítése
        if: steps.mobile_layout.outcome == 'failure'
        run: exit 1

      - name: Futásidejű böngészőteszt eredményének érvényesítése
        if: steps.runtime_browser.outcome == 'failure'
        run: exit 1

      - name: Asztali előnézet eredményének érvényesítése
        if: steps.desktop_previews.outcome == 'failure'
        run: exit 1

      - name: Alkalmazástesztek eredményének érvényesítése
        if: steps.app_tests.outcome == 'failure'
        run: exit 1

      - name: Teljes tesztcsomag eredményének érvényesítése
        if: steps.full_tests.outcome == 'failure'
        run: exit 1

      - name: Generált játékfájl, riport és előnézetek mentése
        if: github.event_name == 'push' && success()
        run: |
          GENERATED_FILES="Fociskartyak2026.html mobile-layout-report.json runtime-browser-report.json previews/*.png data/enrichment-audit.json data/players-reviewed.json data/database-review.json data/database-review.md data/database-changelog.json data/missing-player-data-reviewed.json"
          if git diff --quiet -- $GENERATED_FILES; then
            echo "Az önálló játékfájl, a riportok és az előnézetek naprakészek."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $GENERATED_FILES
          git commit -m "Önálló build, vizuális előnézetek és audit frissítése [skip ci]"
          git push
