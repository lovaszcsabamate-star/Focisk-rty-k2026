name: Apply step 13 game mode factory

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-13-game-mode-factory'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-13-game-mode-factory
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-13-game-mode-factory.mjs
      - name: Célzott ellenőrzések
        run: |
          node --check js/game/game-mode-factory.js
          node --check js/game/game-runtime.js
          node test/game-mode-factory.test.mjs
          node test/game-runtime.test.mjs
          node test/save-service.test.mjs
          npm run build:standalone
          node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          rm scripts/apply-step-13-game-mode-factory.mjs
          rm .github/workflows/apply-step-13-game-mode-factory.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "13. lépés: játékmód-factory bekötése"
          git push origin HEAD:refactor/step-13-game-mode-factory
