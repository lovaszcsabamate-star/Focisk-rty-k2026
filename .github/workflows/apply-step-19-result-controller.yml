name: Apply step 19 result controller

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-19-result-controller'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-19-result-controller
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-19-result-controller.mjs
      - name: Szintaktikai ellenőrzés
        run: |
          node --check js/app/result-controller.js
          node --check js/main.js
          node --check test/result-controller.test.mjs
      - name: Eredményvezérlő regressziós tesztje
        run: node test/result-controller.test.mjs
      - name: Menüvezérlő regresszió
        run: node test/menu-controller.test.mjs
      - name: Játékruntime regresszió
        run: node test/game-runtime.test.mjs
      - name: Assetlicenc-audit
        run: node scripts/audit-assets.mjs
      - name: Standalone build
        run: npm run build:standalone
      - name: Statikus regresszió
        run: node test/static.test.mjs
      - name: Standalone játékmotor regresszió
        run: node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          git checkout HEAD -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json \
            previews/selection-phase-desktop.png
          rm scripts/apply-step-19-result-controller.mjs
          rm .github/workflows/apply-step-19-result-controller.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "19. lépés: végeredmény-vezérlő leválasztása"
          git push origin HEAD:refactor/step-19-result-controller
