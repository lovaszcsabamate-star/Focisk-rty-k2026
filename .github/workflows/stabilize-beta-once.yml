name: Playwright lockfile előkészítése

on:
  push:
    branches:
      - stabilize-beta-2026-07-22
    paths:
      - .github/workflows/stabilize-beta-once.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/stabilize-beta-once.yml

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilize-beta-2026-07-22
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Playwright függőség rögzítése
        run: npm install --save-dev @playwright/test
      - name: Lockfile feltöltése
        uses: actions/upload-artifact@v4
        with:
          name: playwright-lockfile
          path: |
            package.json
            package-lock.json
