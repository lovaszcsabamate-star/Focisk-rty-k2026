name: 10. lépés save-service integráció

on:
  push:
    branches: [refactor/step-10-save-service]

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/step-10-save-service
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Save-service bekötése
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, value):
              Path(path).write_text(value, encoding='utf-8')

          path = 'js/mobile-experience.js'
          source = read(path)
          source = source.replace(
              "import {\n  DEFAULT_EXPERIENCE_SETTINGS,\n  SAVED_MATCH_VERSION,\n  APP_STORAGE_KEYS,\n  settingStorageKey,\n} from './app/configuration.js';",
              "import {\n  DEFAULT_EXPERIENCE_SETTINGS,\n  APP_STORAGE_KEYS,\n  settingStorageKey,\n} from './app/configuration.js';",
          )
          source = source.replace(
              "import {\n  readStoredBoolean, readStoredJson, removeStoredValue, writeStoredBoolean, writeStoredJson,\n} from './services/storage-service.js';",
              "import { readStoredBoolean, writeStoredBoolean } from './services/storage-service.js';\nimport {\n  clearSavedMatch, hydrateGame, readSavedMatch, writeSavedMatch,\n} from './services/save-service.js';\n\nexport { clearSavedMatch, hydrateGame, readSavedMatch, writeSavedMatch };",
          )
          start = source.index('export function readSavedMatch()')
          end = source.index('export function installConnectivityBadge()')
          source = source[:start] + source[end:]
          write(path, source)

          path = 'scripts/build-standalone.mjs'
          source = read(path)
          marker = "  'js/ai.js',\n"
          addition = marker + "  'js/services/save-service.js',\n"
          if "'js/services/save-service.js'" not in source:
              source = source.replace(marker, addition)
          write(path, source)

          path = 'sw.js'
          source = read(path)
          source = source.replace(
              '// Korábbi cache-verziók: fociskartyak-2026-v30 ... fociskartyak-2026-v54',
              '// Korábbi cache-verziók: fociskartyak-2026-v30 ... fociskartyak-2026-v55',
          )
          source = source.replace("const PWA_CACHE = 'fociskartyak-2026-v55';", "const PWA_CACHE = 'fociskartyak-2026-v56';")
          marker = "  './js/services/storage-service.js',\n"
          addition = marker + "  './js/services/save-service.js',\n"
          if './js/services/save-service.js' not in source:
              source = source.replace(marker, addition)
          write(path, source)

          path = 'package.json'
          package = json.loads(read(path))
          scripts = package['scripts']
          scripts['test:save-service'] = 'node test/save-service.test.mjs'
          lint = scripts['lint']
          if 'node --check js/services/save-service.js' not in lint:
              lint = lint.replace(
                  'node --check js/services/storage-service.js',
                  'node --check js/services/storage-service.js && node --check js/services/save-service.js',
              )
          if 'node --check test/save-service.test.mjs' not in lint:
              lint = lint.replace(
                  'node --check test/storage-service.test.mjs',
                  'node --check test/storage-service.test.mjs && node --check test/save-service.test.mjs',
              )
          scripts['lint'] = lint
          for key in ('test', 'test:all'):
              if 'node test/save-service.test.mjs' not in scripts[key]:
                  scripts[key] = scripts[key].replace(
                      'node test/storage-service.test.mjs',
                      'node test/storage-service.test.mjs && node test/save-service.test.mjs',
                  )
          write(path, json.dumps(package, ensure_ascii=False, indent=2) + '\n')
          PY
      - name: Célzott és teljes ellenőrzés
        run: |
          npm run lint
          npm run test:save-service
          node test/storage-service.test.mjs
          node test/game-runtime.test.mjs
          npm run build:standalone
          node scripts/runtime-browser-smoke.mjs
          npm test
      - name: Integráció commitolása
        run: |
          rm .github/workflows/step-10-save-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git add js package.json scripts/build-standalone.mjs sw.js test docs
          git commit -m "10. lépés: validált save-service integrációja"
          git push origin HEAD:refactor/step-10-save-service
