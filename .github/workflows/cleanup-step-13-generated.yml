name: Cleanup step 13 generated files

on:
  push:
    branches:
      - refactor/step-13-game-mode-factory
    paths:
      - .github/workflows/cleanup-step-13-generated.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'refactor/step-13-game-mode-factory' || github.ref_name == 'refactor/step-13-game-mode-factory'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-13-game-mode-factory
          fetch-depth: 0
      - name: Main szinkron és generált fájlok visszaállítása
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          git checkout origin/main -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json
          rm .github/workflows/cleanup-step-13-generated.yml
          git add -A
          git commit -m "13. lépés: main szinkron és generált fájlok tisztítása"
          git push origin HEAD:refactor/step-13-game-mode-factory
