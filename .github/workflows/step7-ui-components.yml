name: 7. lépés UI-komponens refaktor

on:
  pull_request:
    branches:
      - main
    paths:
      - 'js/ui/**'
      - 'js/ui.js'
      - 'scripts/apply-step7-ui-components.mjs'
      - 'test/ui-components.test.mjs'
      - '.github/workflows/step7-ui-components.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-ui-components:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-7-visual-components
          fetch-depth: 0

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: UI-façade komponensekre bontása
        run: node scripts/apply-step7-ui-components.mjs

      - name: Célzott szintaktikai ellenőrzés
        run: |
          node --check js/ui/dom-primitives.js
          node --check js/ui/card-component.js
          node --check js/ui/scoreboard-component.js
          node --check js/ui/attribute-picker-component.js
          node --check js/ui.js
          node --check test/ui-components.test.mjs

      - name: UI-komponens szerződésteszt
        run: node test/ui-components.test.mjs

      - name: Refaktorált fájlok visszaemelése
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "7. lépés: vizuális réteg stabil komponensekre bontása"
          git push origin HEAD:refactor/step-7-visual-components
