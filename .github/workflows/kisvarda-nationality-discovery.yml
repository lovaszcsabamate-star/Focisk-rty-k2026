name: Kisvárda nemzetiségi véglegesítés

on:
  push:
    branches:
      - data/kisvarda-nationalities-completion
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire:
    if: ${{ !contains(github.event.head_commit.message || '', '[kisvarda-nationalities-wired]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: data/kisvarda-nationalities-completion
      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Adat- és buildintegráció
        run: node scripts/wire-kisvarda-nationalities.mjs
      - name: Teljes ellenőrzés
        run: |
          npm run lint
          npm run build
          npm test
          npm run test:all
          git diff --check
      - name: Végleges módosítások mentése
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Kisvárda nemzetiségi adat- és buildintegrációja [kisvarda-nationalities-wired]"
          git push
