name: Temporary project naming normalization

on:
  push:
    branches:
      - chore/step-24-project-naming

permissions:
  contents: write

jobs:
  normalize:
    if: ${{ !contains(github.event.head_commit.message, '[naming-normalized]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/step-24-project-naming
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Normalize project identity
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const readJson = path => JSON.parse(fs.readFileSync(path, 'utf8'));
          const writeJson = (path, value) => fs.writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);

          const identity = {
            schemaVersion: 1,
            displayName: 'Fociskártyák 2026',
            shortName: 'Fociskártyák',
            packageName: 'fociskartyak-2026',
            version: '1.1.0',
            standaloneFile: 'Fociskartyak2026.html',
            androidAppId: 'hu.fociskartyak.game2026',
            repositoryOwner: 'lovaszcsabamate-star',
            canonicalRepositoryName: 'fociskartyak2026',
            currentRepositoryAlias: 'Focisk-rty-k2026',
            legacyProductNames: [
              'super-mega-fotbal-2026',
              'SUPER MEGA FOTBAL 2026'
            ]
          };
          writeJson('project-identity.json', identity);

          const pkg = readJson('package.json');
          pkg.name = identity.packageName;
          pkg.version = identity.version;
          pkg.description = 'Telepíthető magyar NB I 2025/26 összehasonlító fociskártya-játék';
          pkg.scripts['test:naming'] = 'node test/project-naming.test.mjs';
          if (!pkg.scripts.lint.includes('test/project-naming.test.mjs')) {
            pkg.scripts.lint += ' && node --check test/project-naming.test.mjs';
          }
          for (const scriptName of ['test', 'test:all']) {
            if (!pkg.scripts[scriptName].includes('test/project-naming.test.mjs')) {
              pkg.scripts[scriptName] = `node test/project-naming.test.mjs && ${pkg.scripts[scriptName]}`;
            }
          }
          writeJson('package.json', pkg);

          const cssPath = 'css/style.css';
          const css = fs.readFileSync(cssPath, 'utf8')
            .replace('SUPER MEGA FOTBAL 2026 — pub card game', 'FOCISKÁRTYÁK 2026 — pub card game');
          fs.writeFileSync(cssPath, css);

          const mobilePath = 'mobil.html';
          let mobile = fs.readFileSync(mobilePath, 'utf8');
          mobile = mobile.replace(
            '<div class="address">https://lovaszcsabamate-star.github.io/Focisk-rty-k2026/</div>',
            '<div class="address" id="mobile-address"></div>'
          );
          if (!mobile.includes("document.querySelector('#mobile-address')")) {
            mobile = mobile.replace(
              '</body>',
              `  <script>\n    const mobileAddress = document.querySelector('#mobile-address');\n    if (mobileAddress) mobileAddress.textContent = new URL('./', window.location.href).href;\n  </script>\n</body>`
            );
          }
          fs.writeFileSync(mobilePath, mobile);

          const readmePath = 'README.md';
          let readme = fs.readFileSync(readmePath, 'utf8');
          const identitySection = `\n## Projektazonosítók\n\n- Megjelenített név: **${identity.displayName}**\n- NPM-csomagnév: \`${identity.packageName}\`\n- Android alkalmazásazonosító: \`${identity.androidAppId}\`\n- Önálló játékfájl: \`${identity.standaloneFile}\`\n- Kanonikus repónév: \`${identity.canonicalRepositoryName}\`\n\nA jelenlegi GitHub-technikai útvonal a korábbi hibás karakterátalakítás miatt még \`${identity.currentRepositoryAlias}\`. Az alkalmazáskód és a kiadási csomagok már kizárólag a kanonikus Fociskártyák-neveket használják; a technikai útvonal külön kompatibilitási alias.\n`;
          if (!readme.includes('## Projektazonosítók')) {
            const introEnd = readme.indexOf('\n## Letöltés');
            readme = introEnd >= 0
              ? `${readme.slice(0, introEnd)}${identitySection}${readme.slice(introEnd)}`
              : `${readme}${identitySection}`;
          }
          fs.writeFileSync(readmePath, readme);

          const test = `import assert from 'node:assert/strict';\nimport fs from 'node:fs';\n\nconst read = relative => fs.readFileSync(new URL(relative, import.meta.url), 'utf8');\nconst json = relative => JSON.parse(read(relative));\n\nconst identity = json('../project-identity.json');\nconst pkg = json('../package.json');\nconst lock = json('../package-lock.json');\nconst manifest = json('../manifest.webmanifest');\nconst capacitor = json('../capacitor.config.json');\nconst css = read('../css/style.css');\nconst index = read('../index.html');\nconst mobile = read('../mobil.html');\nconst readme = read('../README.md');\n\nassert.equal(identity.displayName, 'Fociskártyák 2026');\nassert.equal(identity.packageName, 'fociskartyak-2026');\nassert.equal(identity.version, pkg.version);\nassert.equal(pkg.name, identity.packageName);\nassert.equal(lock.name, pkg.name);\nassert.equal(lock.version, pkg.version);\nassert.equal(lock.packages[''].name, pkg.name);\nassert.equal(lock.packages[''].version, pkg.version);\nassert.equal(manifest.name, identity.displayName);\nassert.equal(manifest.short_name, identity.shortName);\nassert.equal(capacitor.appName, identity.displayName);\nassert.equal(capacitor.appId, identity.androidAppId);\nassert.match(index, /Fociskártyák 2026/);\nassert.match(readme, /## Projektazonosítók/);\nassert.match(readme, /fociskartyak-2026/);\nassert.match(mobile, /id=\"mobile-address\"/);\nassert.match(mobile, /new URL\('\.\/\', window\.location\.href\)/);\nfor (const legacy of identity.legacyProductNames) {\n  assert.doesNotMatch(pkg.name, new RegExp(legacy.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&'), 'i'));\n  assert.doesNotMatch(css, new RegExp(legacy.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&'), 'i'));\n}\n\nconsole.log('✓ A Fociskártyák projekt nevei és verziói egységesek');\n`;
          fs.writeFileSync('test/project-naming.test.mjs', test);
          NODE

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Verify naming
        run: node test/project-naming.test.mjs

      - name: Commit normalized files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json project-identity.json css/style.css mobil.html README.md test/project-naming.test.mjs
          if git diff --cached --quiet; then
            echo "No naming changes to commit."
            exit 0
          fi
          git commit -m "24. lépés: projektnevek egységesítése [naming-normalized] [skip ci]"
          git push origin HEAD:chore/step-24-project-naming
