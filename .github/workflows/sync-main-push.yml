name: Main szinkron végrehajtása

on:
  push:
    branches:
      - stabilize-beta-2026-07-22
    paths:
      - scripts/sync-main-once.py
      - .github/workflows/sync-main-push.yml

permissions:
  contents: write

concurrency:
  group: fociskartyak-main-sync-push
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilize-beta-2026-07-22
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Main fejlesztések portolása
        run: python scripts/sync-main-once.py

      - name: Függőségek telepítése
        run: npm ci

      - name: Chromium telepítése
        run: |
          npx playwright install --with-deps chromium
          echo "CHROME_BIN=$(node -e \"const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())\")" >> "$GITHUB_ENV"

      - name: Teljes ellenőrzési lánc
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm run build
          npm test
          npm run test:all
          npm run test:mobile-layout
          git diff --check

      - name: Ellenőrzött változások commitolása
        shell: bash
        run: |
          set -euo pipefail
          rm -rf playwright-report test-results previews
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Átvezeti a main mobil- és névjavításait a stabil bétába'
          git fetch origin main
          git merge -s ours origin/main -m 'Összehangolja a stabil bétát a main ággal'
          git push origin HEAD:stabilize-beta-2026-07-22

      - name: Teszttermékek feltöltése
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-sync-artifacts
          if-no-files-found: warn
          retention-days: 30
          path: |
            test-artifacts/
            mobile-layout-report.json
            playwright-report/
