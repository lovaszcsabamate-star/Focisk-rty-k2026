name: Végső hiánylista felderítése

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Hiánylista kinyerése
        run: node scripts/discover-final-missing-data.mjs
      - name: Lista mentése
        uses: actions/upload-artifact@v4
        with:
          name: final-missing-data-discovery
          path: final-missing-data-discovery.json
          retention-days: 2
