name: 9. lépés standalone duplikált script javítása

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-standalone-script:
    if: github.head_ref == 'refactor/step-9-storage-configuration' || github.ref_name == 'refactor/step-9-storage-configuration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/step-9-storage-configuration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Külső scriptcímke eltávolításának bekötése
        run: |
          python - <<'PY'
          from pathlib import Path
          build = Path('scripts/build-standalone.mjs')
          source = build.read_text(encoding='utf-8')
          marker = "  .replace('  <script type=\"module\" src=\"js/focus-experience.js\"></script>\\n', '')\n"
          addition = "  .replace('  <script type=\"module\" src=\"js/visual-settings-persistence.js\"></script>\\n', '')\n"
          if addition not in source:
              if marker not in source:
                  raise SystemExit('A standalone scripteltávolítási beszúrási pont nem található.')
              source = source.replace(marker, marker + addition, 1)
          build.write_text(source, encoding='utf-8')

          test = Path('test/storage-service.test.mjs')
          source = test.read_text(encoding='utf-8')
          assertion = "assert.match(build, /visual-settings-persistence\\.js\\\"\\><\\/script>/);"
          if assertion not in source:
              source = source.replace(
                  "assert.ok(build.indexOf(\"'js/services/storage-service.js'\") < build.indexOf(\"'js/deck-selection.js'\"));",
                  "assert.ok(build.indexOf(\"'js/services/storage-service.js'\") < build.indexOf(\"'js/deck-selection.js'\"));\nassert.match(build, /visual-settings-persistence\\.js.*replace|replace.*visual-settings-persistence\\.js/s);",
                  1,
              )
          test.write_text(source, encoding='utf-8')
          PY
      - name: Önálló build és runtime ellenőrzése
        run: |
          npm run lint
          npm run test:storage-service
          npm run build:standalone
          npm run test:runtime
      - name: Javítás commitolása
        run: |
          rm .github/workflows/step-9-standalone-script-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/build-standalone.mjs test/storage-service.test.mjs .github/workflows/step-9-standalone-script-cleanup.yml
          git commit -m "9. lépés: duplikált standalone modulhivatkozás eltávolítása"
          git push origin HEAD:refactor/step-9-storage-configuration
