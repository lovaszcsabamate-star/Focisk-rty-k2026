name: 9. lépés végső storage-szerkezeti javítás

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-structure:
    if: github.head_ref == 'refactor/step-9-storage-configuration' || github.ref_name == 'refactor/step-9-storage-configuration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/step-9-storage-configuration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Buildlista, pakliválasztó és statikus teszt javítása
        run: |
          python - <<'PY'
          from pathlib import Path

          deck = Path('js/deck-selection.js')
          source = deck.read_text(encoding='utf-8')
          source = source.replace(
            "import { readStoredJson, writeStoredJson } from './services/storage-service.js';",
            "import { readStoredJson, readStoredString, removeStoredValue, writeStoredJson } from './services/storage-service.js';",
            1,
          )
          old = """    let hasSavedMatch = false;
              try { hasSavedMatch = Boolean(localStorage.getItem(SAVED_MATCH_STORAGE_KEY)); } catch { /* optional storage */ }
              if (hasSavedMatch && !window.confirm('A pakli cseréje törli a jelenlegi mentett mérkőzést. Folytatod?')) return;

              try { localStorage.removeItem(SAVED_MATCH_STORAGE_KEY); } catch { /* optional storage */ }
              saveDeckSelection(next);"""
          # A forrás normál behúzását külön kezeljük.
          old = old.replace('    let', '    let').replace('      try', '    try').replace('      if', '    if').replace('      save', '    save')
          if old not in source:
            old = """    let hasSavedMatch = false;
            try { hasSavedMatch = Boolean(localStorage.getItem(SAVED_MATCH_STORAGE_KEY)); } catch { /* optional storage */ }
            if (hasSavedMatch && !window.confirm('A pakli cseréje törli a jelenlegi mentett mérkőzést. Folytatod?')) return;

            try { localStorage.removeItem(SAVED_MATCH_STORAGE_KEY); } catch { /* optional storage */ }
            saveDeckSelection(next);"""
          if old not in source:
            raise SystemExit('A pakliválasztó közvetlen storage-blokkja nem található.')
          new = """    const hasSavedMatch = Boolean(readStoredString(SAVED_MATCH_STORAGE_KEY));
            if (hasSavedMatch && !window.confirm('A pakli cseréje törli a jelenlegi mentett mérkőzést. Folytatod?')) return;

            removeStoredValue(SAVED_MATCH_STORAGE_KEY);
            saveDeckSelection(next);"""
          source = source.replace(old, new, 1)
          deck.write_text(source, encoding='utf-8')

          build = Path('scripts/build-standalone.mjs')
          source = build.read_text(encoding='utf-8')
          marker = "  'js/services/storage-service.js',\n"
          if "  'js/deck-selection.js',\n" not in source:
            source = source.replace(marker, marker + "  'js/deck-selection.js',\n", 1)
          if "  'js/visual-settings-persistence.js',\n" not in source:
            source = source.replace("  'js/focus-experience.js',\n  'js/visual-system.js',", "  'js/focus-experience.js',\n  'js/visual-settings-persistence.js',\n  'js/visual-system.js',", 1)
          build.write_text(source, encoding='utf-8')

          test = Path('test/visual-system.test.mjs')
          source = test.read_text(encoding='utf-8')
          source = source.replace(
            "const legalUi = read('js/legal-ui.js');",
            "const legalUi = read('js/legal-ui.js');\nconst configuration = read('js/app/configuration.js');\nconst storageService = read('js/services/storage-service.js');",
            1,
          )
          source = source.replace(
            "assert.match(visual, /localStorage/, 'A megjelenési beállításokat helyben kell menteni.');",
            "assert.match(visual, /writeStoredJson\\(STORAGE_KEY, settings\\)/, 'A megjelenési beállításokat a központi storage-szolgáltatással kell menteni.');\nassert.match(visual, /APP_STORAGE_KEYS\\.visualSettings/, 'A vizuális rendszernek a központi storage-kulcsot kell használnia.');",
            1,
          )
          source = source.replace(
            "assert.match(sizingPersistence, /SIZING_BACKUP_KEY\\s*=\\s*'fociskartyak\\.visual-sizing\\.v1'/, 'Hiányzik a külön méretezési mentési kulcs.');",
            "assert.match(sizingPersistence, /SIZING_BACKUP_KEY\\s*=\\s*APP_STORAGE_KEYS\\.visualSizingBackup/, 'Hiányzik a központi méretezési mentési kulcs.');",
            1,
          )
          source = source.replace(
            "assert.match(sizingPersistence, /localStorage\\.setItem/, 'A méretezés mentésének helyi tárhelyet kell használnia.');",
            "assert.match(sizingPersistence, /writeStoredJson/, 'A méretezés mentésének a központi storage-szolgáltatást kell használnia.');\nassert.match(configuration, /visualSizingBackup:\\s*'fociskartyak\\.visual-sizing\\.v1'/, 'A méretezési kulcs értékének változatlannak kell maradnia.');\nassert.match(storageService, /globalThis\\.localStorage/, 'A storage-szolgáltatásnak a böngésző helyi tárhelyét kell használnia.');",
            1,
          )
          test.write_text(source, encoding='utf-8')
          PY
      - name: Célzott és teljes tesztek
        run: |
          npm run lint
          npm run test:storage-service
          node test/visual-system.test.mjs
          node test/deck-selection.test.mjs
          node test/player-profile.test.mjs
          npm test
          npm run build:standalone
          node test/standalone-game-runtime.test.mjs
      - name: Végleges forrás commitolása
        run: |
          rm -f .github/workflows/step-9-diagnostic.yml
          rm -f .github/workflows/step-9-diagnostic-artifact.yml
          rm -f .github/workflows/step-9-final-structural-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/deck-selection.js scripts/build-standalone.mjs test/visual-system.test.mjs
          git add .github/workflows/step-9-diagnostic.yml .github/workflows/step-9-diagnostic-artifact.yml .github/workflows/step-9-final-structural-fix.yml
          git commit -m "9. lépés: storage-szerződés és standalone build véglegesítése"
          git push origin HEAD:refactor/step-9-storage-configuration
