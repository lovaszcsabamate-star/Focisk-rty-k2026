name: Kódminőség

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Szintaxis és regressziós tesztek
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Függőségek telepítése
        run: npm ci

      - name: Szintaxisellenőrzés
        run: npm run lint

      - name: Teljes tesztcsomag
        run: npm test
