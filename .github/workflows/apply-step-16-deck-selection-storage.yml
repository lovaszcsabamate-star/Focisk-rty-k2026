name: Apply step 16 deck selection storage

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/step-16-deck-selection-storage'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-16-deck-selection-storage
          fetch-depth: 0
      - name: Node.js 22 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Integráció alkalmazása
        run: node scripts/apply-step-16-deck-selection-storage.mjs
      - name: Szintaktikai ellenőrzés
        run: |
          node --check js/services/deck-selection-storage-service.js
          node --check js/deck-selection.js
          node --check test/deck-selection-storage-service.test.mjs
      - name: Pakliválasztási tárolási teszt
        run: node test/deck-selection-storage-service.test.mjs
      - name: Pakliválasztási domain regresszió
        run: node test/deck-selection-domain.test.mjs
      - name: Régi importútvonal regressziója
        run: node test/deck-selection.test.mjs
      - name: Assetlicenc-audit
        run: node scripts/audit-assets.mjs
      - name: Standalone build
        run: npm run build:standalone
      - name: Statikus regresszió
        run: node test/static.test.mjs
      - name: Standalone játékmotor regresszió
        run: node test/standalone-game-runtime.test.mjs
      - name: Integráció commitolása
        run: |
          git checkout HEAD -- \
            Fociskartyak2026.html \
            data/database-changelog.json \
            data/database-review.json \
            data/database-review.md \
            data/enrichment-audit.json \
            data/missing-player-data-reviewed.json
          rm scripts/apply-step-16-deck-selection-storage.mjs
          rm .github/workflows/apply-step-16-deck-selection-storage.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "16. lépés: pakliválasztási tárolás leválasztása"
          git push origin HEAD:refactor/step-16-deck-selection-storage
