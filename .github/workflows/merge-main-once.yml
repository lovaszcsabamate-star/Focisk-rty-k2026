name: Main előzmények egyszeri összehangolása

on:
  push:
    branches:
      - stabilize-beta-2026-07-22
    paths:
      - .github/workflows/merge-main-once.yml

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilize-beta-2026-07-22
          fetch-depth: 0
      - name: Legfrissebb main lekérése és előzmények egyesítése
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo 'A main már része az ág előzményeinek.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge -s ours origin/main -m 'Összehangolja a stabil bétát a legfrissebb main ággal'
          git push origin HEAD:stabilize-beta-2026-07-22
