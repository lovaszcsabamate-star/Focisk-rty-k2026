name: 8. lépés kategóriaregiszter integráció

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate-category-registry:
    if: github.head_ref == 'refactor/step-8-category-registry' || github.ref_name == 'refactor/step-8-category-registry'
    runs-on: ubuntu-latest
    steps:
      - name: Forráskód letöltése
        uses: actions/checkout@v4
        with:
          ref: refactor/step-8-category-registry
          fetch-depth: 0

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Kategóriaregiszter integrálása
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          players_path = Path('js/data/players.js')
          players = players_path.read_text(encoding='utf-8')

          import_line = "import { CATEGORY_MINIMUM_COVERAGE, CATEGORY_RATE_MINUTES, createCategoryRegistry } from './categories.js';\n\n"
          if import_line not in players:
              marker = " */\n\nconst PLACEHOLDER_VALUES"
              if marker not in players:
                  raise SystemExit('Nem található a players.js importbeszúrási pontja.')
              players = players.replace(marker, " */\n\n" + import_line + "const PLACEHOLDER_VALUES", 1)

          old_constants = "export const MIN_MINUTES_FOR_RATE_STATS = 90;\nexport const MIN_CATEGORY_COVERAGE = 0.10;\nexport const CATEGORY_AVAILABILITY = {};"
          new_constants = "export const MIN_MINUTES_FOR_RATE_STATS = CATEGORY_RATE_MINUTES;\nexport const MIN_CATEGORY_COVERAGE = CATEGORY_MINIMUM_COVERAGE;"
          if old_constants in players:
              players = players.replace(old_constants, new_constants, 1)

          registry_block = r'''const categoryRegistry = createCategoryRegistry({
            normaliseNumber,
            parseBirthDate,
            calculateAge,
          });

          /** Kanonikus kategóriaexportok. */
          export const CATEGORY_DEFINITIONS = categoryRegistry.definitions;
          export const CATEGORY_BY_ID = categoryRegistry.byId;
          export const ENABLED_CATEGORIES = categoryRegistry.enabledCategories;
          export const CARD_CATEGORY_IDS = categoryRegistry.cardCategoryIds;
          export const CATEGORY_AVAILABILITY = categoryRegistry.availability;
          export const categoryValue = categoryRegistry.value;
          export const hasCategoryData = categoryRegistry.hasValue;
          export const formatCategoryValue = categoryRegistry.formatValue;
          export const configureCategories = categoryRegistry.configure;

          /** Visszafelé kompatibilis attribútumexportok a meglévő motorhoz és UI-hoz. */
          export const ATTRIBUTE_DEFINITIONS = CATEGORY_DEFINITIONS;
          export const ATTRIBUTE_BY_KEY = CATEGORY_BY_ID;
          export const ATTRIBUTES = ENABLED_CATEGORIES;
          export const CARD_ATTRIBUTE_KEYS = CARD_CATEGORY_IDS;
          export const attributeValue = categoryValue;
          export const hasAttributeData = hasCategoryData;
          export const formatAttribute = formatCategoryValue;
          export const configureAttributes = configureCategories;'''

          pattern = re.compile(r"const integer = value =>.*?\nconst pickNumber =", re.S)
          players, count = pattern.subn(registry_block + "\n\nconst pickNumber =", players, count=1)
          if count != 1:
              raise SystemExit(f'A kategóriablokk cseréje nem egyértelmű: {count}')
          players_path.write_text(players, encoding='utf-8')

          build_path = Path('scripts/build-standalone.mjs')
          build = build_path.read_text(encoding='utf-8')
          build_marker = "  'js/data/players.js',"
          if "'js/data/categories.js'" not in build:
              build = build.replace(build_marker, "  'js/data/categories.js',\n" + build_marker, 1)
          build_path.write_text(build, encoding='utf-8')

          sw_path = Path('sw.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = re.sub(
              r"// Korábbi cache-verziók: fociskartyak-2026-v30 \.\.\. fociskartyak-2026-v\d+\nconst PWA_CACHE = 'fociskartyak-2026-v\d+';",
              "// Korábbi cache-verziók: fociskartyak-2026-v30 ... fociskartyak-2026-v53\nconst PWA_CACHE = 'fociskartyak-2026-v54';",
              sw,
              count=1,
          )
          sw_marker = "  './js/data/players.js',"
          if "'./js/data/categories.js'" not in sw:
              sw = sw.replace(sw_marker, "  './js/data/categories.js',\n" + sw_marker, 1)
          sw_path.write_text(sw, encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          scripts = package['scripts']
          scripts['test:category-registry'] = 'node test/category-registry.test.mjs'

          lint = scripts['lint']
          if 'node --check js/data/categories.js' not in lint:
              lint = lint.replace('node --check js/data/players.js', 'node --check js/data/categories.js && node --check js/data/players.js')
          if 'node --check test/category-registry.test.mjs' not in lint:
              lint = lint.replace('node --check test/ui-components.test.mjs', 'node --check test/category-registry.test.mjs && node --check test/ui-components.test.mjs')
          scripts['lint'] = lint

          for key in ('test', 'test:all'):
              command = scripts[key]
              if 'node test/category-registry.test.mjs' not in command:
                  command = command.replace('node test/categories.test.mjs', 'node test/category-registry.test.mjs && node test/categories.test.mjs')
              scripts[key] = command

          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Célzott és teljes szintaktikai ellenőrzés
        run: |
          npm run lint
          npm run test:category-registry
          node test/categories.test.mjs
          npm run build:standalone
          node test/standalone-game-runtime.test.mjs

      - name: Ideiglenes workflow eltávolítása és eredmény visszaemelése
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm .github/workflows/step-8-category-registry-refactor.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/data/players.js scripts/build-standalone.mjs sw.js package.json
          git rm --cached .github/workflows/step-8-category-registry-refactor.yml || true
          git add -u
          git commit -m "8. lépés: kategóriaregiszter bekötése a játékba"
          git push origin HEAD:refactor/step-8-category-registry
