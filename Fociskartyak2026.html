<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Telepíthető magyar NB I 2025/26 fociskártya-játék klasszikus és tizenegyespárbaj móddal.">
  <meta name="theme-color" content="#2a1c12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fociskártyák">
  <title>Fociskártyák 2026</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <style>/* ==========================================================================
   SUPER MEGA FOTBAL 2026 — pub card game
   ART SLOTS are marked with  /* ART:  ... they currently render a CSS
   fallback and expect a background-image drop-in later. See assets/README.md
   ========================================================================== */

:root {
  --wood-dark:   #2a1c12;
  --wood:        #3d2a1a;
  --wood-light:  #5a3f28;
  --felt:        #1e3a2f;
  --felt-light:  #2a5142;
  --brass:       #c9a227;
  --brass-light: #e8c37a;
  --cream:       #f2e6d0;
  --muted:       #a08d72;
  --win:         #6abf7a;
  --lose:        #bf6a6a;
  --tie:         #bfa76a;

  --card-w: 132px;
  /* Tall enough for all seven stat rows without scrolling. At 190px the list
     was 48px short and the last three attributes were simply not visible. */
  --card-h: 232px;
  /* Card stock colour at the bottom of the face — the scroll-shadow covers
     must match it to stay invisible. */
  --card-paper: #ded0b4;

  --font-display: 'Bebas Neue', 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
  --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--wood-dark);
  color: var(--cream);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── Pub scene ─────────────────────────────────────────────────────────── */

#pub {
  position: relative;
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr 320px;
  /* ART: assets/pub/background.jpg — replace the gradient below */
  background:
    radial-gradient(ellipse at 50% 10%, rgba(232,195,122,.10) 0%, transparent 55%),
    linear-gradient(180deg, var(--wood) 0%, var(--wood-dark) 100%);
  background-size: cover;
  background-position: center;
}

/* Hanging lamp glow over the table */
#pub::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 45% at 40% 45%, rgba(255, 210, 130, .13), transparent 70%);
  pointer-events: none;
}

/* ── Table ─────────────────────────────────────────────────────────────── */

#table {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 14px 20px;
  gap: 8px;
  min-width: 0;
  /* The felt is the only flexible row — clamp the column so it, and not the
     hands, absorbs any leftover or missing space. */
  height: 100vh;
  min-height: 0;
  overflow: hidden;
}

.zone {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#opponent-zone { flex: 0 0 auto; }

#felt {
  flex: 1 1 auto;
  border-radius: 14px;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(42,81,66,.90), rgba(30,58,47,.84) 70%);
  backdrop-filter: blur(1.5px);
  box-shadow: inset 0 0 60px rgba(0,0,0,.55), 0 4px 20px rgba(0,0,0,.4);
  border: 2px solid rgba(201,162,39,.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  min-height: 0;
  position: relative;
}

#player-zone { flex: 0 0 auto; }

/* ── Header bar ────────────────────────────────────────────────────────── */

#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 0 4px;
  flex: 0 0 auto;
}

.title {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--brass-light);
  text-transform: uppercase;
  white-space: nowrap;
}

.score-strip { display: flex; align-items: center; gap: 14px; font-size: 13px; }

.score {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 12px;
  background: rgba(0,0,0,.3);
  border: 1px solid rgba(201,162,39,.3);
  border-radius: 20px;
}
.score b { font-family: var(--font-display); font-size: 20px; color: var(--brass-light); letter-spacing: 1px; }
.score.leading { border-color: var(--brass); box-shadow: 0 0 12px rgba(201,162,39,.3); }

.meta { color: var(--muted); font-size: 12px; }

.hud-settings { display: flex; gap: 5px; }
.icon-toggle {
  border: 1px solid rgba(201,162,39,.3);
  background: rgba(0,0,0,.28);
  color: var(--cream);
  border-radius: 14px;
  padding: 4px 8px;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
}
.icon-toggle:hover { border-color: var(--brass); }

/* ── Cards ─────────────────────────────────────────────────────────────── */

.card {
  width: var(--card-w);
  height: var(--card-h);
  border-radius: 9px;
  position: relative;
  flex: 0 0 auto;
  background: linear-gradient(160deg, #f7f0e2 0%, #ded0b4 100%);
  color: #241a12;
  box-shadow: 0 3px 10px rgba(0,0,0,.5);
  border: 1px solid rgba(0,0,0,.35);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform .16s ease, box-shadow .16s ease;
}

.card.selectable { cursor: pointer; }
.card.selectable:hover {
  transform: translateY(-14px);
  box-shadow: 0 12px 24px rgba(0,0,0,.6), 0 0 0 2px var(--brass);
  z-index: 5;
}
/* Not playable right now — but still readable, so no pointer-events: none. */
.card--dim { filter: grayscale(.4) brightness(.82); }
.card--dim.selectable:hover { filter: none; }
.card--unavailable { filter: grayscale(1) brightness(.58); }
.card--unavailable.selectable:hover { filter: grayscale(.7) brightness(.72); box-shadow: 0 3px 10px rgba(0,0,0,.5); }
.card--empty { background: rgba(0,0,0,.2); border: 1px dashed rgba(201,162,39,.35); box-shadow: none; }

/* Truly inert (cards sitting in the duel area). */
.card.disabled { filter: grayscale(.5) brightness(.7); pointer-events: none; }

.card__portrait {
  height: 74px;
  flex: 0 0 auto;
  /* ART: assets/portraits/<player-id>.png — set as background-image via JS */
  background: linear-gradient(160deg, #6b7f8f, #3d4d59);
  background-size: cover;
  background-position: center top;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Fallback silhouette while no portrait art exists */
.card__portrait::after {
  content: attr(data-initials);
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 2px;
  color: rgba(255,255,255,.45);
}
.card__portrait.has-art::after { content: none; }

.card__position {
  position: absolute; top: 4px; left: 4px;
  background: rgba(0,0,0,.6); color: var(--brass-light);
  font-size: 9px; font-weight: 700; letter-spacing: .5px;
  padding: 2px 5px; border-radius: 3px;
}

.card__name {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: .6px;
  padding: 4px 6px 1px;
  line-height: 1.05;
  text-transform: uppercase;
}
/* One line only — "Rotterdam Zuid · Netherlands" wrapped to two and stole a
   stat row's worth of height. */
.card__club {
  font-size: 8.5px; color: #6b5b45; padding: 0 6px 4px; letter-spacing: .3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* The stat list scrolls rather than being clipped.
   `min-height: 0` is the load-bearing line: a flex item defaults to
   min-height:auto, which refuses to shrink below its content, so the list
   overflowed the card and `.card { overflow: hidden }` silently ate the last
   rows on short viewports. */
.card__stats {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;   /* don't scroll the page at the ends */
  padding: 0 5px 5px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  scrollbar-width: thin;
  scrollbar-color: rgba(90,71,54,.45) transparent;
}
.card__stats::-webkit-scrollbar { width: 4px; }
.card__stats::-webkit-scrollbar-track { background: transparent; }
.card__stats::-webkit-scrollbar-thumb { background: rgba(90,71,54,.45); border-radius: 2px; }

/* Scroll shadows, pure CSS — no JS measurement, so there's no layout-timing
   race and it re-evaluates for free on resize.
   How it works: the two `local` gradients scroll WITH the content and are the
   card's own colour, so they sit on top of the `scroll`-attached shadows and
   mask them when you're at that end of the list. Scroll away from an edge and
   its cover moves off, revealing the shadow. Net effect: a shadow appears
   exactly when there is more to see in that direction. */
.card__stats {
  background:
    linear-gradient(var(--card-paper) 30%, rgba(222,208,180,0)) center top / 100% 14px no-repeat local,
    linear-gradient(rgba(222,208,180,0), var(--card-paper) 70%) center bottom / 100% 14px no-repeat local,
    radial-gradient(farthest-side at 50% 0,   rgba(60,40,20,.30), rgba(60,40,20,0)) center top / 100% 7px no-repeat scroll,
    radial-gradient(farthest-side at 50% 100%, rgba(60,40,20,.30), rgba(60,40,20,0)) center bottom / 100% 7px no-repeat scroll;
}

.stat {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 9px;
  padding: 1.5px 4px;
  border-radius: 3px;
  background: rgba(0,0,0,.045);
}
.stat__label { color: #5a4a36; letter-spacing: .2px; }
.stat__value { font-weight: 700; font-variant-numeric: tabular-nums; }

.stat.active {
  background: var(--brass);
  color: #2a1c12;
  box-shadow: 0 0 0 1px rgba(0,0,0,.25);
}
.stat.active .stat__label { color: #4a3a12; font-weight: 600; }
.stat--missing { opacity: .48; }
.stat__value { text-align: right; margin-left: 5px; }

/* Card back (opponent's hand) */
.card--back {
  /* ART: assets/cards/back.png */
  background:
    repeating-linear-gradient(45deg, #4a2f2f 0 8px, #3d2626 8px 16px),
    linear-gradient(160deg, #5a3535, #3a2020);
  background-size: cover;
  border: 1px solid rgba(201,162,39,.3);
  display: flex; align-items: center; justify-content: center;
}
.card--back::after {
  content: '⚽';
  font-size: 30px;
  opacity: .3;
}

/* Compact backs for the opponent's fan. The min-height override matters:
   without it the row reserves a full-size card's height and pushes the player's
   hand off the bottom of the viewport. Note the doubled class — the generic
   `.hand` rule below sets min-height from --card-h and would otherwise win on
   source order. */
.hand.hand--opponent { min-height: 90px; }
.hand--opponent .card { --card-w: 62px; --card-h: 90px; }

/* Victory pile stacks */
.pile {
  width: 48px; height: 68px;
  border-radius: 6px;
  border: 1px dashed rgba(201,162,39,.4);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 20px; color: var(--brass-light);
  background: rgba(0,0,0,.25);
  position: relative;
}
.pile.filled { background: linear-gradient(160deg, #5a3535, #3a2020); border-style: solid; }
.pile__label { position: absolute; bottom: -16px; font-size: 9px; color: var(--muted); font-family: var(--font-body); white-space: nowrap; }

/* ── Felt centre: prompts, played cards, result ────────────────────────── */

#prompt {
  font-family: var(--font-display);
  font-size: 19px;
  letter-spacing: 1.4px;
  color: var(--brass-light);
  text-align: center;
  text-transform: uppercase;
  min-height: 24px;
}
#prompt .highlight { color: #fff; }

#attribute-picker { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 620px; }

.attr-btn {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 600;
  padding: 7px 13px;
  border-radius: 20px;
  border: 1px solid rgba(201,162,39,.45);
  background: rgba(0,0,0,.3);
  color: var(--cream);
  cursor: pointer;
  transition: all .14s ease;
}
.attr-btn:hover { background: var(--brass); color: #2a1c12; transform: translateY(-2px); }
.attr-btn:disabled,
.attr-btn--disabled { cursor: not-allowed; opacity: .42; filter: grayscale(1); }
.attr-btn:disabled:hover { background: rgba(0,0,0,.3); color: var(--cream); transform: none; }
.attr-btn small { display: block; font-size: 9px; opacity: .65; font-weight: 400; }

.picker-hint {
  flex-basis: 100%;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .3px;
  margin-top: 2px;
}

#duel { display: flex; align-items: center; gap: 24px; min-height: 200px; }
#duel:empty { display: none; }

.duel-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.duel-slot__who { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.duel-slot .card { animation: deal .28s ease-out; }
.duel-slot.winner .card { box-shadow: 0 0 0 3px var(--win), 0 8px 22px rgba(0,0,0,.6); }
.duel-slot.loser  .card { opacity: .62; }

@keyframes deal {
  from { transform: translateY(24px) scale(.9); opacity: 0; }
  to   { transform: none; opacity: 1; }
}

.versus { font-family: var(--font-display); font-size: 26px; color: var(--brass); opacity: .7; }

#verdict {
  font-family: var(--font-display);
  font-size: 26px; letter-spacing: 2px;
  text-transform: uppercase;
  min-height: 30px;
  text-align: center;
}
#verdict.win  { color: var(--win); }
#verdict.lose { color: var(--lose); }
#verdict.tie  { color: var(--tie); }
#verdict small { display: block; font-family: var(--font-body); font-size: 11px; letter-spacing: .3px; color: var(--muted); text-transform: none; margin-top: 2px; }

#pot-indicator {
  position: absolute; top: 10px; right: 12px;
  font-size: 11px; color: var(--tie);
  border: 1px solid rgba(191,167,106,.4);
  padding: 3px 9px; border-radius: 12px;
  background: rgba(0,0,0,.35);
}
#pot-indicator:empty { display: none; }

.hand { display: flex; gap: 8px; justify-content: center; align-items: flex-end; min-height: var(--card-h); }

/* ── Banter sidebar ────────────────────────────────────────────────────── */

#banter {
  background: rgba(0,0,0,.32);
  border-left: 1px solid rgba(201,162,39,.2);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#banter h2 {
  font-family: var(--font-display); font-size: 15px; letter-spacing: 2px;
  padding: 12px 14px 8px; color: var(--brass); text-transform: uppercase;
  border-bottom: 1px solid rgba(201,162,39,.15);
}

#banter-feed {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,162,39,.35) transparent;
}
#banter-feed::-webkit-scrollbar { width: 6px; }
#banter-feed::-webkit-scrollbar-thumb { background: rgba(201,162,39,.35); border-radius: 3px; }

.bubble { display: flex; gap: 9px; animation: fadein .3s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

.avatar {
  width: 32px; height: 32px; flex: 0 0 auto;
  border-radius: 50%;
  /* ART: assets/friends/<speaker-id>.png */
  background-size: cover;
  background-position: center;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 15px;
  color: #1a1208;
  border: 1px solid rgba(0,0,0,.35);
}

.bubble__body { min-width: 0; }
.bubble__name { font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 2px; }
.bubble__text { font-size: 12.5px; line-height: 1.45; color: #ded0b4; }

/* ── Buttons & overlay ─────────────────────────────────────────────────── */

.btn {
  font-family: var(--font-display);
  font-size: 16px; letter-spacing: 1.5px;
  padding: 9px 26px;
  border: none; border-radius: 6px;
  background: var(--brass); color: #241a12;
  cursor: pointer;
  text-transform: uppercase;
  transition: transform .12s ease, filter .12s ease;
}
.btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn:disabled { opacity: .45; cursor: not-allowed; filter: grayscale(1); transform: none; }
.btn--ghost { background: transparent; color: var(--brass-light); border: 1px solid rgba(201,162,39,.45); }

/* ── Card inspector ────────────────────────────────────────────────────── */

#inspector {
  position: fixed; inset: 0;
  z-index: 40;
  padding: 10px;
  background: rgba(10, 6, 3, .82);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  animation: fadein .16s ease;
}

.inspector__shell {
  display: flex; align-items: center; gap: 12px;
  max-width: 100%; max-height: 100%;
}

.inspector__centre { display: flex; flex-direction: column; align-items: center; gap: 12px; }

.inspector__nav {
  width: 44px; height: 64px;
  font-size: 32px; line-height: 1;
  background: rgba(0,0,0,.4);
  color: var(--brass-light);
  border: 1px solid rgba(201,162,39,.35);
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s ease;
}
.inspector__nav:hover { background: var(--brass); color: #2a1c12; }

.inspector__counter { font-size: 11px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
.inspector__details {
  display: flex;
  flex-direction: column;
  gap: 3px;
  color: var(--muted);
  font-size: 11px;
  text-align: center;
}
.inspector__actions { display: flex; gap: 10px; }
.inspector__hint { font-size: 11px; color: var(--muted); letter-spacing: .3px; }

/* The blown-up card: same markup, readable type.
   Height is clamped to the viewport so the card can never push its own action
   buttons off-screen — on a short window it shrinks and the stat list scrolls
   instead. ~150px is reserved for the counter, buttons and hint below it. */
.card--large {
  --card-w: min(300px, 84vw);
  --card-h: min(496px, calc(100vh - 150px));
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.75), 0 0 0 2px var(--brass);
  animation: none;
}
/* The portrait yields height first, so the stats keep as much room as possible. */
.card--large .card__portrait { height: clamp(56px, 22vh, 168px); }
.card--large .card__portrait::after { font-size: 56px; }
.card--large .card__position { font-size: 13px; padding: 4px 9px; top: 8px; left: 8px; }
.card--large .card__name { font-size: 30px; padding: 10px 14px 2px; }
.card--large .card__club { font-size: 14px; padding: 0 14px 8px; }
.card--large .card__stats { padding: 0 12px 12px; gap: 3px; }
.card--large .stat { font-size: 15px; padding: 6px 10px; border-radius: 5px; }
.card--large .stat.active { box-shadow: 0 0 0 2px rgba(0,0,0,.3); }

@media (max-height: 700px) {
  .card--large { --card-w: min(232px, 84vw); }
  .card--large .card__name { font-size: 23px; padding: 6px 12px 1px; }
  .card--large .card__club { font-size: 12px; padding: 0 12px 5px; }
  .card--large .stat { font-size: 12px; padding: 3.5px 8px; }
  .card--large .card__portrait::after { font-size: 34px; }
  .inspector__nav { height: 48px; width: 36px; font-size: 26px; }
  .inspector__hint { display: none; }   /* keyboard hints cost a line we need */
}

#overlay {
  position: fixed; inset: 0;
  background: rgba(12,8,4,.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
  backdrop-filter: blur(3px);
}
#overlay[hidden] { display: none; }

.panel {
  background: linear-gradient(160deg, var(--wood-light), var(--wood));
  border: 1px solid rgba(201,162,39,.4);
  border-radius: 12px;
  padding: 30px 36px;
  max-width: 520px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.7);
}
.panel h1 {
  font-family: var(--font-display); font-size: 40px; letter-spacing: 3px;
  color: var(--brass-light); text-transform: uppercase; line-height: 1;
  margin-bottom: 6px;
}
.panel p { font-size: 13px; line-height: 1.6; color: var(--cream); margin-bottom: 14px; }
.panel .rules { text-align: left; font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
.panel .rules b { color: var(--brass-light); }

.deck-source {
  margin-top: 14px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .3px;
}
.deck-source code {
  background: rgba(0,0,0,.35);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--brass-light);
  font-size: 10.5px;
}

.difficulty { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
.difficulty label {
  padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid rgba(201,162,39,.35); color: var(--cream);
}
.difficulty input { display: none; }
.difficulty input:checked + span { color: var(--brass-light); font-weight: 700; }
.difficulty label:has(input:checked) { background: rgba(201,162,39,.18); border-color: var(--brass); }

/* ── Main menu & result screens ───────────────────────────────────────── */

.eyebrow,
.result-kicker {
  color: var(--brass) !important;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 10px !important;
  margin-bottom: 6px !important;
}

.mode-picker {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 16px 0;
}
.mode-card { cursor: pointer; text-align: left; }
.mode-card input { position: absolute; opacity: 0; }
.mode-card span {
  display: flex;
  flex-direction: column;
  min-height: 88px;
  gap: 5px;
  padding: 13px;
  border: 1px solid rgba(201,162,39,.32);
  border-radius: 9px;
  background: rgba(0,0,0,.24);
}
.mode-card b { color: var(--brass-light); }
.mode-card small { color: var(--muted); line-height: 1.4; }
.mode-card input:checked + span { border-color: var(--brass); background: rgba(201,162,39,.14); box-shadow: 0 0 0 1px rgba(201,162,39,.24); }

.menu-toggles { display: flex; justify-content: center; gap: 18px; margin: -7px 0 17px; color: var(--cream); font-size: 12px; }
.menu-toggles label { cursor: pointer; }
.menu-toggles input { accent-color: var(--brass); }

.final-score {
  font-family: var(--font-display);
  font-size: 31px;
  letter-spacing: 2px;
  color: var(--cream);
  margin: 14px 0;
}
.result-panel--win h1 { color: var(--win); }
.result-panel--loss h1 { color: var(--lose); }
.result-stats { display: grid; gap: 7px; margin: 16px 0 20px; }
.result-stats div { display: flex; justify-content: space-between; gap: 18px; border-bottom: 1px solid rgba(201,162,39,.16); padding-bottom: 6px; font-size: 12px; }
.result-stats dt { color: var(--muted); text-align: left; }
.result-stats dd { color: var(--cream); text-align: right; }
.result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── Penalties mode ───────────────────────────────────────────────────── */

.penalty-score {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: 1.8px;
  color: var(--brass-light);
  white-space: nowrap;
}

#penalty-board {
  width: min(660px, 100%);
  display: grid;
  gap: 4px;
  padding: 6px 9px;
  background: rgba(0,0,0,.28);
  border: 1px solid rgba(201,162,39,.22);
  border-radius: 8px;
}
#penalty-board[hidden] { display: none; }
.attempt-row { display: grid; grid-template-columns: 66px 1fr; align-items: center; gap: 7px; }
.attempt-row strong { font-size: 9px; letter-spacing: .8px; color: var(--muted); }
.attempt-marks { display: grid; grid-template-columns: repeat(11, 1fr); gap: 3px; }
.attempt {
  display: grid;
  place-items: center;
  height: 20px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 800;
  border: 1px solid rgba(255,255,255,.1);
}
.attempt--win { background: rgba(70,145,83,.5); color: #dff6e3; }
.attempt--loss { background: rgba(160,65,65,.52); color: #ffe0e0; }
.attempt--tie { background: rgba(140,140,140,.34); color: #eee; }
.attempt--empty { color: rgba(255,255,255,.28); background: rgba(0,0,0,.18); }

#sudden-death-banner {
  position: fixed;
  z-index: 35;
  inset: 42% 0 auto;
  padding: 18px;
  text-align: center;
  font-family: var(--font-display);
  font-size: clamp(34px, 7vw, 72px);
  letter-spacing: 5px;
  color: #fff2d3;
  background: linear-gradient(90deg, transparent, rgba(113,18,14,.95) 18%, rgba(113,18,14,.95) 82%, transparent);
  text-shadow: 0 3px 12px #000;
  animation: sudden-in 1.2s ease both;
  pointer-events: none;
}
#sudden-death-banner[hidden] { display: none; }
@keyframes sudden-in {
  0% { opacity: 0; transform: scale(.7) rotate(-2deg); }
  22%, 70% { opacity: 1; transform: scale(1.04) rotate(0); }
  100% { opacity: 0; transform: scale(1.12); }
}

.mode-penalties .zone { min-width: 0; }
.mode-penalties .hand { max-width: calc(100% - 64px); overflow-x: auto; overflow-y: hidden; justify-content: flex-start; padding: 10px 4px 2px; scrollbar-width: thin; scrollbar-color: rgba(201,162,39,.45) transparent; }
.mode-penalties #player-hand .card { --card-w: 94px; --card-h: 174px; }
.mode-penalties #player-hand .card__portrait { height: 48px; }
.mode-penalties #player-hand .card__name { font-size: 10px; }
.mode-penalties #player-hand .stat { font-size: 7.5px; }
.mode-penalties .hand.hand--opponent { max-width: calc(100% - 64px); min-height: 70px; padding-top: 2px; }
.mode-penalties .hand--opponent .card { --card-w: 45px; --card-h: 65px; }
.mode-penalties #felt { gap: 6px; }

.penalty-intro h1 { font-size: 34px; }

@media (max-width: 1100px) {
  #pub { grid-template-columns: 1fr 250px; }
  :root { --card-w: 112px; --card-h: 164px; }
}

@media (max-width: 900px) {
  #pub { grid-template-columns: 1fr; }
  #banter { display: none; }
  #table { padding: 8px; gap: 5px; }
  :root { --card-w: clamp(64px, 17vw, 112px); --card-h: clamp(128px, 30vw, 188px); }
  .hand { gap: clamp(3px, 1vw, 8px); }
  .card__portrait { height: clamp(38px, 8vw, 58px); }
  .card__name { font-size: clamp(9px, 1.8vw, 13px); }
  .stat { font-size: clamp(7px, 1.35vw, 8.5px); }
  #felt { padding: 7px; }
  .mode-penalties #player-hand .card { --card-w: 82px; --card-h: 150px; }
}

@media (max-width: 620px) {
  #hud { display: grid; grid-template-columns: 1fr auto; gap: 4px 7px; }
  #hud .title { display: none; }
  .score-strip { gap: 5px; }
  .score { padding: 3px 8px; }
  .meta { font-size: 9px; text-align: left; }
  .hud-settings { justify-content: flex-end; }
  .icon-toggle { font-size: 0; width: 30px; height: 24px; padding: 2px; }
  .icon-toggle::first-letter { font-size: 12px; }
  .panel { margin: 8px; padding: 22px 16px; max-height: calc(100vh - 16px); overflow-y: auto; }
  .panel h1 { font-size: 31px; }
  .mode-picker { grid-template-columns: 1fr; }
  .mode-card span { min-height: 0; }
  .difficulty { flex-wrap: wrap; }
  .menu-toggles { flex-direction: column; gap: 7px; }
  .inspector__shell { gap: 3px; }
  .inspector__nav { width: 28px; }
  .inspector__details { font-size: 9px; }
  #duel { gap: 9px; }
  .versus { font-size: 18px; }
  #verdict { font-size: 21px; }
  .mode-penalties #player-hand .card { --card-w: 76px; --card-h: 140px; }
  .mode-penalties .hand { max-width: calc(100% - 48px); }
  #penalty-board { padding: 4px; }
  .attempt-row { grid-template-columns: 48px 1fr; gap: 3px; }
  .attempt { height: 17px; font-size: 9px; }
  .penalty-score { font-size: 19px; }
}

/* Short viewports (laptops, browser with devtools open).
   The card gets NARROWER but stays reasonably tall, and the portrait gives up
   height first — shrinking the card uniformly left only ~38px for the stat
   list, i.e. one readable row at a time. The felt absorbs the difference. */
@media (max-height: 860px) and (min-width: 901px) {
  :root { --card-w: 122px; --card-h: 208px; }
  .card__portrait { height: 58px; }
  .card__name { font-size: 13px; padding: 3px 6px 1px; }
  #duel { min-height: 0; }
}
@media (max-height: 700px) and (min-width: 901px) {
  :root { --card-w: 112px; --card-h: 186px; }
  .card__portrait { height: 48px; }
  .stat { font-size: 8.5px; padding: 1px 4px; }
}
@media (max-height: 620px) and (min-width: 901px) {
  :root { --card-w: 108px; --card-h: 176px; }
  .card__portrait { height: 44px; }
  .card__portrait::after { font-size: 18px; }
  .card__name { font-size: 12px; padding: 2px 5px 0; }
  .card__club { font-size: 7.5px; padding: 0 5px 3px; }
  .stat { font-size: 8px; padding: 1px 4px; }
  .hand.hand--opponent { min-height: 66px; }
  .hand--opponent .card { --card-w: 46px; --card-h: 66px; }
}


/* User-friendly interaction layer loaded after style.css. */

:root {
  --touch-target: 44px;
}

/* ── Round progress ────────────────────────────────────────────────────── */

.game-steps {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  width: min(520px, 100%);
  gap: 6px;
  margin-bottom: 1px;
}

.game-steps[hidden] { display: none; }

.game-step {
  position: relative;
  padding: 5px 8px;
  border-radius: 999px;
  border: 1px solid rgba(201,162,39,.22);
  background: rgba(0,0,0,.2);
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4px;
  text-align: center;
  white-space: nowrap;
}

.game-step.is-complete {
  color: var(--cream);
  border-color: rgba(106,191,122,.4);
  background: rgba(106,191,122,.12);
}

.game-step.is-active {
  color: #241a12;
  border-color: var(--brass);
  background: var(--brass-light);
  box-shadow: 0 0 14px rgba(201,162,39,.24);
}

.ux-direction {
  display: inline;
  margin-left: 4px;
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .2px;
  text-transform: none;
}

/* ── Compact settings menu ─────────────────────────────────────────────── */

.ux-settings {
  position: relative;
}

.ux-settings__trigger {
  min-height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px 10px;
  border: 1px solid rgba(201,162,39,.34);
  border-radius: 16px;
  background: rgba(0,0,0,.3);
  color: var(--cream);
  font-size: 11px;
  cursor: pointer;
  list-style: none;
  white-space: nowrap;
}

.ux-settings__trigger::-webkit-details-marker { display: none; }
.ux-settings[open] .ux-settings__trigger { border-color: var(--brass); }

.ux-settings__panel {
  position: absolute;
  z-index: 45;
  top: calc(100% + 7px);
  right: 0;
  width: min(260px, calc(100vw - 20px));
  padding: 7px;
  display: grid;
  gap: 5px;
  border: 1px solid rgba(201,162,39,.45);
  border-radius: 9px;
  background: rgba(42,28,18,.97);
  box-shadow: 0 12px 30px rgba(0,0,0,.55);
}

.ux-setting-row {
  min-height: var(--touch-target);
  padding: 8px 10px;
  border: 1px solid rgba(201,162,39,.2);
  border-radius: 7px;
  background: rgba(0,0,0,.24);
  color: var(--cream);
  font: inherit;
  font-size: 12px;
  text-align: left;
  cursor: pointer;
}

.ux-setting-row:hover,
.ux-setting-row:focus-visible {
  border-color: var(--brass);
  background: rgba(201,162,39,.13);
}

.ux-banter-toggle { display: none; }

/* ── Cleaner cards ─────────────────────────────────────────────────────── */

.card {
  isolation: isolate;
}

.card__stats {
  overflow-y: hidden;
  background: none;
  scrollbar-width: none;
}

.card__stats::-webkit-scrollbar { display: none; }

.card__inspect {
  position: absolute;
  z-index: 8;
  top: 4px;
  right: 4px;
  width: 30px;
  height: 30px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255,255,255,.42);
  border-radius: 50%;
  background: rgba(20,14,9,.72);
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  opacity: .92;
}

.card__inspect:hover,
.card__inspect:focus-visible {
  background: var(--brass);
  color: #241a12;
  outline: 2px solid #fff;
  outline-offset: 1px;
}

.card--direct-play::before {
  content: 'Kijátszás';
  position: absolute;
  z-index: 7;
  right: 5px;
  bottom: 5px;
  padding: 2px 5px;
  border-radius: 4px;
  background: rgba(36,26,18,.76);
  color: #fff7df;
  font-size: 7px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  pointer-events: none;
}

.card--direct-play:focus-visible,
.card--inspectable:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 3px;
}

.card .stat.active {
  order: -1;
  padding-block: 3px;
  font-size: 10px;
}

.card--large .card__stats {
  overflow-y: auto;
  background:
    linear-gradient(var(--card-paper) 30%, rgba(222,208,180,0)) center top / 100% 14px no-repeat local,
    linear-gradient(rgba(222,208,180,0), var(--card-paper) 70%) center bottom / 100% 14px no-repeat local,
    radial-gradient(farthest-side at 50% 0, rgba(60,40,20,.30), rgba(60,40,20,0)) center top / 100% 7px no-repeat scroll,
    radial-gradient(farthest-side at 50% 100%, rgba(60,40,20,.30), rgba(60,40,20,0)) center bottom / 100% 7px no-repeat scroll;
}

.card--unavailable {
  cursor: not-allowed;
}

.card--unavailable::after {
  content: 'Ehhez a kategóriához nincs adat';
  position: absolute;
  z-index: 6;
  inset: auto 4px 4px;
  padding: 4px;
  border-radius: 4px;
  background: rgba(20,14,9,.82);
  color: #fff;
  font-size: 7px;
  line-height: 1.2;
  text-align: center;
}

/* ── Category chooser and feedback ────────────────────────────────────── */

#attribute-picker {
  width: min(660px, 100%);
  display: grid;
  grid-template-columns: repeat(2, minmax(180px, 1fr));
  gap: 8px;
}

.attr-btn {
  min-height: var(--touch-target);
  padding: 9px 12px;
  border-radius: 9px;
  text-align: left;
}

.attr-btn__label {
  display: block;
  font-size: 13px;
}

.attr-btn small {
  margin-top: 2px;
  font-size: 10px;
}

.ux-change-attribute {
  justify-self: center;
  min-height: 38px;
  padding: 7px 16px;
  font-size: 13px;
}

.ux-empty-state {
  grid-column: 1 / -1;
  padding: 12px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

#verdict small {
  margin-top: 5px;
  color: var(--cream);
  font-size: 13px;
  font-weight: 700;
}

#verdict.win small::before { content: '✓ '; color: var(--win); }
#verdict.lose small::before { content: '✕ '; color: var(--lose); }
#verdict.tie small::before { content: '= '; color: var(--tie); }

#attribute-picker.has-next-action {
  display: flex;
  justify-content: center;
}

#attribute-picker.has-next-action > .btn {
  min-height: var(--touch-target);
}

.ux-result-stats {
  max-height: 260px;
  overflow-y: auto;
  padding-right: 3px;
}

/* ── Mobile-first card hand ───────────────────────────────────────────── */

@media (max-width: 900px) {

@media (max-width: 620px) {

@media (max-height: 700px) and (max-width: 900px) {

  font-size: 27px;
  line-height: 1;
  letter-spacing: 1px;
  text-align: center;
}

.match-scoreboard__separator {
  color: #59615d;
  font-size: 18px;
  font-weight: 900;
}

.match-scoreboard__status {
  grid-area: status;
  padding: 2px 8px 3px;
  background: #090b0a;
  color: var(--brass-light);
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 1px;
  text-align: center;
  white-space: nowrap;
}

.match-scoreboard__status::before {
  content: '●';
  margin-right: 5px;
  color: #66d17a;
  font-size: 8px;
  text-shadow: 0 0 7px rgba(102,209,122,.8);
}

.match-scoreboard--penalties .match-scoreboard__competition {
  background: linear-gradient(90deg, #76231f, #a23b32 50%, #76231f);
}

.match-scoreboard--penalties .match-scoreboard__status::before {
  content: '⚽';
  color: inherit;
  text-shadow: none;
}

@media (max-width: 900px) {
  .score-strip { min-width: 0; }
  .match-scoreboard { width: min(360px, 100%); }
}

@media (max-width: 620px) {
  .score-strip {
    grid-column: 1 / -1;
    width: 100%;
  }

  .match-scoreboard {
    width: 100%;
    grid-template-columns: minmax(72px, 1fr) auto minmax(60px, 1fr);
  }

  .match-team { padding: 4px 5px; gap: 4px; }
  .match-team__crest { width: 17px; height: 17px; font-size: 9px; }
  .match-team__name { font-size: 11px; letter-spacing: .6px; }
  .match-scoreboard__score { min-width: 82px; padding: 2px 7px; }
  .match-scoreboard__number { min-width: 21px; font-size: 24px; }
  .match-scoreboard__status { font-size: 7px; letter-spacing: .7px; }
}


.pwa-install-button {
  border-color: rgba(232, 195, 122, .72);
  color: #f2e6d0;
  background: linear-gradient(180deg, rgba(60, 45, 28, .96), rgba(23, 17, 12, .96));
}

.pwa-install-button:hover,
.pwa-install-button:focus-visible {
  border-color: #e8c37a;
  box-shadow: 0 0 0 2px rgba(232, 195, 122, .2);
}

.pwa-install-guide {
  position: fixed;
  inset: 0;
  z-index: 3000;
  display: grid;
  place-items: end center;
  padding: 18px;
  background: rgba(7, 5, 3, .76);
  backdrop-filter: blur(7px);
}

.pwa-install-guide__panel {
  position: relative;
  width: min(100%, 430px);
  max-height: min(82vh, 650px);
  overflow: auto;
  padding: 28px 22px 24px;
  border: 1px solid rgba(232, 195, 122, .55);
  border-radius: 22px 22px 12px 12px;
  color: #f2e6d0;
  background:
    radial-gradient(circle at 50% 0, rgba(50, 97, 71, .44), transparent 52%),
    linear-gradient(180deg, #2e2117, #17100b);
  box-shadow: 0 -14px 55px rgba(0, 0, 0, .55);
}

.pwa-install-guide__panel h2 {
  margin: 6px 0 12px;
  text-align: center;
  color: #e8c37a;
  font-size: clamp(1.35rem, 5vw, 1.8rem);
}

.pwa-install-guide__panel p,
.pwa-install-guide__panel li {
  line-height: 1.55;
}

.pwa-install-guide__panel ol {
  margin: 18px 0;
  padding-left: 1.4rem;
  color: #d9c8aa;
}

.pwa-install-guide__icon {
  width: 64px;
  height: 64px;
  display: grid;
  place-items: center;
  margin: 0 auto;
  border: 2px solid #e8c37a;
  border-radius: 18px;
  background: #1d4939;
  font-size: 34px;
  box-shadow: 0 8px 26px rgba(0, 0, 0, .35);
}

.pwa-install-guide__close {
  position: absolute;
  top: 10px;
  right: 12px;
  width: 36px;
  height: 36px;
  border: 0;
  border-radius: 50%;
  color: #f2e6d0;
  background: rgba(255, 255, 255, .08);
  font-size: 26px;
  cursor: pointer;
}

.pwa-install-guide__done {
  width: 100%;
}

@media (min-width: 700px) {
  .pwa-install-guide {
    place-items: center;
  }

  .pwa-install-guide__panel {
    border-radius: 18px;
  }
}

@media (display-mode: standalone) {
  .pwa-install-button {
    display: none !important;
  }

  body {
    overscroll-behavior-y: contain;
  }
}

<body>

  <!-- ART: assets/pub/background.png is applied to #pub by ui.js when present -->
  <div id="pub">

    <main id="table">

      <header id="hud">
        <div class="title">Fociskártyák 2026</div>
        <div class="score-strip" id="hud-scores"></div>
        <div class="meta" id="hud-meta"></div>
        <div class="hud-settings" id="hud-settings"></div>
      </header>

      <!-- Opponent: face-down hand + victory pile -->
      <section class="zone" id="opponent-zone">
        <div class="pile" id="opponent-pile"><span class="pile__label">Gép nyereménye</span></div>
        <div class="hand hand--opponent" id="opponent-hand"></div>
      </section>

      <!-- The table itself -->
      <section id="felt">
        <div id="sudden-death-banner" hidden></div>
        <div id="penalty-board" hidden></div>
        <div id="pot-indicator"></div>
        <div id="prompt"></div>
        <div id="duel"></div>
        <div id="verdict"></div>
        <div id="attribute-picker"></div>
      </section>

      <!-- Player: hand + victory pile -->
      <section class="zone" id="player-zone">
        <div class="pile" id="player-pile"><span class="pile__label">Megnyert lapok</span></div>
        <div class="hand" id="player-hand"></div>
      </section>

    </main>

    <!-- Kocsmai kommentár -->
    <aside id="banter">
      <h2>A hátsó asztal</h2>
      <div id="banter-feed"></div>
    </aside>

  </div>

  <div id="overlay" hidden>

<script type="module">
/* ===== js/data/players.js ===== */
/**
 * NB I card data contract, normalisation and centrally configured comparison categories.
 *
 * Real card fields are never guessed. Unknown values stay `null`; categories are enabled
 * only when the loaded database contains enough valid values, and cards without a valid
 * value cannot be used in that comparison.
 */

const PLACEHOLDER_VALUES = new Set([
  '', '-', '–', '—', 'n/a', 'n.a.', 'na', 'null', 'undefined', 'ismeretlen', 'nincs adat',
]);
const ISO_DATE = /^\d{4}-\d{2}-\d{2}$/;
const isFiniteNumber = value => typeof value === 'number' && Number.isFinite(value);
const firstValid = values => values.find(value => value != null) ?? null;

const SEASON_REFERENCE_DATE = new Date('2026-05-16T00:00:00Z');
const MIN_MINUTES_FOR_RATE_STATS = 90;
const MIN_CATEGORY_COVERAGE = 0.10;
const CATEGORY_AVAILABILITY = {};

function normaliseNumber(value) {
  if (isFiniteNumber(value)) return value;
  if (typeof value !== 'string') return null;

  const raw = value.trim();
  if (PLACEHOLDER_VALUES.has(raw.toLocaleLowerCase('hu-HU'))) return null;

  let cleaned = raw
    .replace(/\u00a0/g, ' ')
    .replace(/\s+/g, '')
    .replace(/[€$£¥₽₿]/g, '')
    .replace(/(?:eur|huf|ft)$/i, '');

  let multiplier = 1;
  const suffix = cleaned.match(/(k|ezer|m|millió|million)$/i)?.[1]?.toLocaleLowerCase('hu-HU');
  if (suffix) {
    cleaned = cleaned.slice(0, -suffix.length);
    multiplier = suffix === 'k' || suffix === 'ezer' ? 1_000 : 1_000_000;
  }

  const comma = cleaned.lastIndexOf(',');
  const dot = cleaned.lastIndexOf('.');
  if (comma !== -1 && dot !== -1) {
    const decimalSeparator = comma > dot ? ',' : '.';
    const thousandsSeparator = decimalSeparator === ',' ? /\./g : /,/g;
    cleaned = cleaned.replace(thousandsSeparator, '').replace(decimalSeparator, '.');
  } else if (comma !== -1) {
    cleaned = cleaned.replace(',', '.');
  } else if ((cleaned.match(/\./g) ?? []).length > 1) {
    cleaned = cleaned.replace(/\./g, '');
  }

  const parsed = Number(cleaned);
  return Number.isFinite(parsed) ? parsed * multiplier : null;
}

function validatedIsoDate(year, month, day) {
  const time = Date.UTC(year, month - 1, day);
  const parsed = new Date(time);
  if (parsed.getUTCFullYear() !== year
    || parsed.getUTCMonth() !== month - 1
    || parsed.getUTCDate() !== day) return null;
  return `${String(year).padStart(4, '0')}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
}

function normaliseDate(value) {
  if (value instanceof Date && Number.isFinite(value.getTime())) {
    return validatedIsoDate(value.getUTCFullYear(), value.getUTCMonth() + 1, value.getUTCDate());
  }
  if (typeof value !== 'string') return null;
  const raw = value.trim();
  if (PLACEHOLDER_VALUES.has(raw.toLocaleLowerCase('hu-HU'))) return null;

  let match = raw.match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})\.?$/);
  if (match) return validatedIsoDate(Number(match[1]), Number(match[2]), Number(match[3]));

  match = raw.match(/^(\d{1,2})[-./](\d{1,2})[-./](\d{4})\.?$/);
  if (match) return validatedIsoDate(Number(match[3]), Number(match[2]), Number(match[1]));

  return null;
}

function parseBirthDate(value) {
  const iso = normaliseDate(value);
  if (!iso || !ISO_DATE.test(iso)) return null;
  const [year, month, day] = iso.split('-').map(Number);
  return Date.UTC(year, month - 1, day);
}

function calculateAge(birthDate, reference = SEASON_REFERENCE_DATE) {
  const timestamp = parseBirthDate(birthDate);
  if (timestamp == null) return null;
  const born = new Date(timestamp);
  let age = reference.getUTCFullYear() - born.getUTCFullYear();
  const beforeBirthday = reference.getUTCMonth() < born.getUTCMonth()
    || (reference.getUTCMonth() === born.getUTCMonth() && reference.getUTCDate() < born.getUTCDate());
  if (beforeBirthday) age -= 1;
  return age;
}

const integer = value => `${Math.round(value)}`;
const decimal = value => value.toLocaleString('hu-HU', { maximumFractionDigits: 2 });
const percent = value => `${decimal(value)}%`;
const minutes = value => `${Math.round(value)} perc`;
const centimetres = value => `${decimal(value)} cm`;
const money = value => new Intl.NumberFormat('hu-HU', {
  style: 'currency', currency: 'EUR', maximumFractionDigits: value >= 1_000_000 ? 1 : 0,
}).format(value);

const statValue = key => card => normaliseNumber(card?.stats?.[key]);
const exactBirthDate = card => parseBirthDate(card?.birthDate);
const safeRatio = (numerator, denominator, multiplier = 1) => {
  if (!isFiniteNumber(numerator) || !isFiniteNumber(denominator) || denominator <= 0) return null;
  const value = numerator / denominator * multiplier;
  return Number.isFinite(value) ? value : null;
};
const ratePer90 = (card, numeratorKey) => {
  const numerator = normaliseNumber(card?.stats?.[numeratorKey]);
  const playedMinutes = normaliseNumber(card?.stats?.minutes);
  if (playedMinutes == null || playedMinutes < MIN_MINUTES_FOR_RATE_STATS) return null;
  return safeRatio(numerator, playedMinutes, 90);
};
const goalContributions = card => {
  const goals = normaliseNumber(card?.stats?.goals);
  const assists = normaliseNumber(card?.stats?.assists);
  return goals == null || assists == null ? null : goals + assists;
};
const disciplinaryEvents = card => {
  const yellows = normaliseNumber(card?.stats?.yellowCards);
  const dismissals = normaliseNumber(card?.stats?.totalDismissals);
  return yellows == null || dismissals == null ? null : yellows + dismissals;
};

const ATTRIBUTE_BY_KEY = Object.fromEntries(ATTRIBUTE_DEFINITIONS.map(attribute => [attribute.key, attribute]));
const ATTRIBUTES = ATTRIBUTE_DEFINITIONS.filter(attribute => attribute.enabledByDefault);
const CARD_ATTRIBUTE_KEYS = ['birthDate', 'appearances', 'starts', 'goals', 'squads', 'yellowCards', 'totalDismissals'];

/** Return a comparable primitive, or null for unknown/malformed data. */
function attributeValue(card, attributeKey) {
  const attribute = ATTRIBUTE_BY_KEY[attributeKey];
  if (!card || !attribute) return null;
  const value = attribute.getValue(card);
  return isFiniteNumber(value) ? value : null;
}

const hasAttributeData = (card, attributeKey) => attributeValue(card, attributeKey) != null;

function formatAttribute(card, attributeKey) {
  const attribute = ATTRIBUTE_BY_KEY[attributeKey];
  if (!attribute) return '';
  const value = attributeValue(card, attributeKey);
  return value == null ? '' : attribute.format(value, card);
}

function configureAttributes(cards, { minimumCoverage = MIN_CATEGORY_COVERAGE } = {}) {
  const pool = Array.isArray(cards) ? cards : [];
  const minimumKnown = Math.max(2, Math.ceil(pool.length * minimumCoverage));
  const enabled = [];

  for (const attribute of ATTRIBUTE_DEFINITIONS) {
    const known = pool.filter(card => hasAttributeData(card, attribute.key)).length;
    const coverage = pool.length ? known / pool.length : 0;
    const active = known >= minimumKnown || (!attribute.optional && known === pool.length && known > 0);
    const status = active ? (coverage < 0.5 ? 'experimental' : 'enabled') : 'disabled';
    Object.assign(attribute, { enabled: active, knownValues: known, coverage, status });
    CATEGORY_AVAILABILITY[attribute.key] = { enabled: active, knownValues: known, coverage, status };
    if (active) enabled.push(attribute);
  }

  ATTRIBUTES.splice(0, ATTRIBUTES.length, ...enabled);
  return CATEGORY_AVAILABILITY;
}

const pickNumber = (...values) => firstValid(values.map(normaliseNumber));

/** Backward-compatible normalisation for older and future enriched JSON payloads. */
function normaliseCard(card = {}) {
  const rawStats = card.stats && typeof card.stats === 'object' ? card.stats : {};
  const stats = {
    ...rawStats,
    age: pickNumber(rawStats.age, card.age),
    appearances: pickNumber(rawStats.appearances, rawStats.matches, rawStats.games, card.appearances),
    starts: pickNumber(rawStats.starts, rawStats.startingAppearances, card.starts),
    goals: pickNumber(rawStats.goals, card.goals),
    squads: pickNumber(rawStats.squads, rawStats.matchdaySquads, card.squads),
    minutes: pickNumber(rawStats.minutes, rawStats.playingMinutes, rawStats.minutesPlayed, card.minutes),
    assists: pickNumber(rawStats.assists, rawStats.goalAssists, card.assists),
    yellowCards: pickNumber(rawStats.yellowCards, rawStats.yellows, card.yellowCards),
    redCards: pickNumber(rawStats.redCards, rawStats.dismissals, card.redCards),
    secondYellowRedCards: pickNumber(rawStats.secondYellowRedCards, rawStats.secondYellowReds),
    totalDismissals: pickNumber(rawStats.totalDismissals),
    overallScore: pickNumber(rawStats.overallScore),
    heightCm: pickNumber(rawStats.heightCm, rawStats.height, card.heightCm, card.height),
    marketValue: pickNumber(rawStats.marketValue, rawStats.marketValueEur, card.marketValue, card.marketValueEur),
    shirtNumber: pickNumber(rawStats.shirtNumber, rawStats.jerseyNumber, card.shirtNumber, card.jerseyNumber),
  };

  if (stats.totalDismissals == null && stats.redCards != null) {
    // MLSZ redCards already represents the complete dismissal total; do not add breakdowns twice.
    stats.totalDismissals = stats.redCards;
  }

  const birthDate = normaliseDate(card.birthDate ?? card.dateOfBirth);
  const calculatedAge = calculateAge(birthDate);
  if (calculatedAge != null) stats.age = calculatedAge;

  return {
    ...card,
    birthDate,
    nation: typeof card.nation === 'string' ? card.nation : '',
    position: typeof card.position === 'string' ? card.position : '',
    stats,
  };
}

const MOCK_PLAYERS = Array.from({ length: 52 }, (_, index) => makeMockPlayer(index));

/** Validate the complete pool while allowing source-declared optional nulls. */
function validatePlayers(cards) {
  const problems = [];

  cards.forEach((card, index) => {
    if (!card?.id || !card?.name || !card?.club) problems.push(`card ${index}: missing id, name or club`);
    if (attributeValue(card, 'goals') == null) {
      problems.push(`${card?.name ?? `card ${index}`}: goals is missing or invalid`);
    }
  });

  if (new Set(cards.map(card => card?.id)).size !== cards.length) problems.push('duplicate card ids');
  return problems;
}

/** Load verified data, falling back only when the whole payload is unusable. */
async function loadPlayers(url = 'data/players.json') {
  try {
    const embedded = globalThis.__EMBEDDED_PLAYER_DATA__;
    let payload;
    if (embedded) {
      payload = embedded;
    } else {
      const response = await fetch(url, { cache: 'no-cache' });
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      payload = await response.json();
    }

    const rawCards = Array.isArray(payload) ? payload : payload.players;
    if (!Array.isArray(rawCards) || rawCards.length === 0) throw new Error('no players array');
    const cards = rawCards.map(normaliseCard);
    const problems = validatePlayers(cards);
    if (problems.length) throw new Error(`${problems.length} invalid card(s): ${problems.slice(0, 5).join('; ')}`);
    configureAttributes(cards);

    console.info(`[players] ${cards.length} valós NB I-játékos betöltve · ${ATTRIBUTES.length} használható kategória${payload.season ? ` · ${payload.season}` : ''}`);
    return { players: cards, source: 'real', meta: Array.isArray(payload) ? null : payload };
  } catch (error) {
    configureAttributes(MOCK_PLAYERS);
    console.info(`[players] Fiktív tartalékpakli használata: ${error.message}`);
    return { players: MOCK_PLAYERS, source: 'mock', meta: null };
  }
}

/** Pure rules for the classic game loop. */


const HAND_SIZE = 5;
const GAME_DECK_SIZE = 52;
const HUMAN = 'human';
const AI = 'ai';

const PHASE = {
  CHOOSE_ATTRIBUTE: 'choose-attribute',
  CHOOSE_CARD: 'choose-card',
  REVEAL: 'reveal',
  GAME_OVER: 'game-over',
};

/** Fisher–Yates, optionally seeded for deterministic tests. */
function shuffle(array, rng = Math.random) {
  const out = array.slice();
  for (let index = out.length - 1; index > 0; index -= 1) {
    const other = Math.floor(rng() * (index + 1));
    [out[index], out[other]] = [out[other], out[index]];
  }
  return out;
}

/** Compare two verified values. Later birth date means younger. */
function compare(attributeKey, humanCard, aiCard) {
  const attribute = ATTRIBUTE_BY_KEY[attributeKey];
  if (!attribute) throw new Error(`Ismeretlen kategória: ${attributeKey}`);

  const humanValue = attributeValue(humanCard, attributeKey);
  const aiValue = attributeValue(aiCard, attributeKey);
  if (humanValue == null || aiValue == null) {
    throw new Error(`A(z) ${attribute.label} kategóriához mindkét kártyán hiteles adat szükséges.`);
  }
  if (humanValue === aiValue) return 'tie';

  const humanAhead = attribute.higherWins ? humanValue > aiValue : humanValue < aiValue;
  return humanAhead ? HUMAN : AI;
}

class Game {
  constructor({ rng = Math.random, players } = {}) {
    if (!Array.isArray(players) || players.length < 2 * HAND_SIZE) {
      throw new Error(`A klasszikus módhoz legalább ${2 * HAND_SIZE} játékos kell.`);
    }

    this.mode = 'classic';
    this.rng = rng;
    let deckSize = Math.min(GAME_DECK_SIZE, players.length);
    if (deckSize % 2) deckSize -= 1;
    this.players = shuffle(players, rng).slice(0, deckSize);
    this.poolSize = players.length;
    this.deck = this.players.slice();
    this.hands = { [HUMAN]: [], [AI]: [] };
    this.won = { [HUMAN]: [], [AI]: [] };
    this.pot = [];
    this.round = 0;
    this.chooser = rng() < 0.5 ? HUMAN : AI;
    this.phase = PHASE.CHOOSE_ATTRIBUTE;
    this.attribute = null;
    this.played = { [HUMAN]: null, [AI]: null };
    this.lastResult = null;
    this.log = [];
    this._refillHands();
    this.round = 1;
  }

  get scores() {
    return { [HUMAN]: this.won[HUMAN].length, [AI]: this.won[AI].length };
  }

  get isOver() { return this.phase === PHASE.GAME_OVER; }

  availableCards(side, attributeKey = this.attribute) {
    if (!attributeKey) return this.hands[side].slice();
    return this.hands[side].filter(card => hasAttributeData(card, attributeKey));
  }

  availableAttributeKeys() {
    return ATTRIBUTES
      .filter(attribute => [HUMAN, AI].every(side => this.availableCards(side, attribute.key).length > 0))
      .map(attribute => attribute.key);
  }

  chooseAttribute(attributeKey, chooserCardId) {
    if (this.phase !== PHASE.CHOOSE_ATTRIBUTE) throw new Error(`Nem választható kategória ebben a fázisban: ${this.phase}`);
    if (!this.availableAttributeKeys().includes(attributeKey)) throw new Error(`A kategória most nem játszható: ${attributeKey}`);
    this.attribute = attributeKey;
    this._commit(this.chooser, chooserCardId);
    this.phase = PHASE.CHOOSE_CARD;
    return this;
  }

  playCard(side, cardId) {
    if (this.phase !== PHASE.CHOOSE_CARD) throw new Error(`Nem játszható ki kártya ebben a fázisban: ${this.phase}`);
    if (side === this.chooser) throw new Error('A kategóriaválasztó már kijátszotta a kártyáját.');
    this._commit(side, cardId);
    return this._resolve();
  }

  _commit(side, cardId) {
    const hand = this.hands[side];
    const index = hand.findIndex(card => card.id === cardId);
    if (index === -1) throw new Error(`A kártya nincs a kézben: ${cardId}`);
    if (!hasAttributeData(hand[index], this.attribute)) throw new Error('Ehhez a kártyához nincs adat a kiválasztott kategóriában.');
    this.played[side] = hand.splice(index, 1)[0];
  }

  _resolve() {
    const humanCard = this.played[HUMAN];
    const aiCard = this.played[AI];
    const winner = compare(this.attribute, humanCard, aiCard);
    const stake = [humanCard, aiCard, ...this.pot];

    if (winner === 'tie') {
      this.pot = stake;
    } else {
      this.won[winner].push(...stake);
      this.pot = [];
    }

    this.lastResult = {
      round: this.round,
      attribute: this.attribute,
      humanCard,
      aiCard,
      winner,
      potScooped: winner === 'tie' ? 0 : stake.length - 2,
      potSize: this.pot.length,
    };
    this.log.push(this.lastResult);
    this.phase = PHASE.REVEAL;
    return this.lastResult;
  }

  nextRound() {
    if (this.phase !== PHASE.REVEAL) throw new Error(`Nem indítható új kör ebben a fázisban: ${this.phase}`);
    this.played = { [HUMAN]: null, [AI]: null };
    this.attribute = null;
    this._refillHands();
    if (this.hands[HUMAN].length === 0 || this.hands[AI].length === 0) {
      this.phase = PHASE.GAME_OVER;
      return this;
    }
    this.chooser = this.chooser === HUMAN ? AI : HUMAN;
    this.round += 1;
    this.phase = PHASE.CHOOSE_ATTRIBUTE;
    return this;
  }

  _refillHands() {
    while (this.deck.length > 0 && (this.hands[HUMAN].length < HAND_SIZE || this.hands[AI].length < HAND_SIZE)) {
      for (const side of [HUMAN, AI]) {
        if (this.hands[side].length < HAND_SIZE && this.deck.length > 0) this.hands[side].push(this.deck.pop());
      }
    }
  }

  result() {
    const { [HUMAN]: human, [AI]: ai } = this.scores;
    return {
      human, ai,
      winner: human === ai ? 'tie' : (human > ai ? HUMAN : AI),
      undecided: this.pot.length,
    };
  }
}

/** Penalties mode state machine. It never mutates or re-draws a team mid-match. */



const PENALTY_TEAM_SIZE = 11;
const REGULAR_DUELS = 5;

class PenaltyGame {
  constructor({ players, rng = Math.random } = {}) {
    if (!Array.isArray(players) || players.length < PENALTY_TEAM_SIZE * 2) {
      throw new Error(`A Penalties mód két külön csapatához legalább ${PENALTY_TEAM_SIZE * 2} játékos kell.`);
    }

    this.mode = 'penalties';
    this.rng = rng;
    const pool = shuffle(players, rng);
    const humanTeam = pool.slice(0, PENALTY_TEAM_SIZE);
    const aiTeam = pool.slice(PENALTY_TEAM_SIZE, PENALTY_TEAM_SIZE * 2);

    this.teams = { [HUMAN]: humanTeam, [AI]: aiTeam };
    this.hands = { [HUMAN]: shuffle(humanTeam, rng), [AI]: shuffle(aiTeam, rng) };
    this.used = { [HUMAN]: [], [AI]: [] };
    this.scores = { [HUMAN]: 0, [AI]: 0 };
    this.attempts = { [HUMAN]: [], [AI]: [] };
    this.chooser = rng() < 0.5 ? HUMAN : AI;
    this.phase = PHASE.CHOOSE_ATTRIBUTE;
    this.attribute = null;
    this.played = { [HUMAN]: null, [AI]: null };
    this.duel = 1;
    this.cycle = 1;
    this.suddenDeath = false;
    this.lastResult = null;
    this.log = [];
    this.categoryWins = Object.fromEntries(ATTRIBUTES.map(attribute => [attribute.key, 0]));
    this.finishStage = null;
    this.finishReason = null;
  }

  get round() { return this.duel; }
  get isOver() { return this.phase === PHASE.GAME_OVER; }
  get regularPlayed() { return Math.min(this.log.length, REGULAR_DUELS); }
  get regularRemaining() { return Math.max(0, REGULAR_DUELS - this.regularPlayed); }

  availableCards(side, attributeKey = this.attribute) {
    if (!attributeKey) return this.hands[side].slice();
    return this.hands[side].filter(card => hasAttributeData(card, attributeKey));
  }

  availableAttributeKeys() {
    return ATTRIBUTES
      .filter(attribute => [HUMAN, AI].every(side => this.availableCards(side, attribute.key).length > 0))
      .map(attribute => attribute.key);
  }

  chooseAttribute(attributeKey, chooserCardId) {
    if (this.phase !== PHASE.CHOOSE_ATTRIBUTE) throw new Error(`Nem választható kategória ebben a fázisban: ${this.phase}`);
    if (!this.availableAttributeKeys().includes(attributeKey)) throw new Error(`A kategória most nem játszható: ${attributeKey}`);
    this.attribute = attributeKey;
    this._commit(this.chooser, chooserCardId);
    this.phase = PHASE.CHOOSE_CARD;
    return this;
  }

  playCard(side, cardId) {
    if (this.phase !== PHASE.CHOOSE_CARD) throw new Error(`Nem játszható ki kártya ebben a fázisban: ${this.phase}`);
    if (side === this.chooser) throw new Error('A kategóriaválasztó már kijátszotta a kártyáját.');
    this._commit(side, cardId);
    return this._resolve();
  }

  _commit(side, cardId) {
    const hand = this.hands[side];
    const index = hand.findIndex(card => card.id === cardId);
    if (index === -1) throw new Error(`A kártya nincs a tizenegyben: ${cardId}`);
    if (!hasAttributeData(hand[index], this.attribute)) throw new Error('Ehhez a kártyához nincs adat a kiválasztott kategóriában.');
    this.played[side] = hand.splice(index, 1)[0];
  }

  _resolve() {
    const winner = compare(this.attribute, this.played[HUMAN], this.played[AI]);
    if (winner !== 'tie') this.scores[winner] += 1;
    if (winner === HUMAN) this.categoryWins[this.attribute] += 1;

    const humanMark = winner === HUMAN ? 'win' : winner === AI ? 'loss' : 'tie';
    const aiMark = winner === AI ? 'win' : winner === HUMAN ? 'loss' : 'tie';
    this.attempts[HUMAN].push(humanMark);
    this.attempts[AI].push(aiMark);
    this.used[HUMAN].push(this.played[HUMAN]);
    this.used[AI].push(this.played[AI]);

    const wasSuddenDeath = this.suddenDeath;
    const remaining = Math.max(0, REGULAR_DUELS - this.duel);
    const lead = Math.abs(this.scores[HUMAN] - this.scores[AI]);
    let enteredSuddenDeath = false;

    if (!wasSuddenDeath && this.duel < REGULAR_DUELS && lead > remaining) {
      this._finish('rendes játékidő', 'behozhatatlan előny');
    } else if (!wasSuddenDeath && this.duel === REGULAR_DUELS) {
      if (this.scores[HUMAN] !== this.scores[AI]) this._finish('rendes játékidő', 'öt párbaj');
      else {
        this.suddenDeath = true;
        enteredSuddenDeath = true;
      }
    } else if (wasSuddenDeath && winner !== 'tie') {
      this._finish('hirtelen halál', 'első eldőlt hirtelen halál-párbaj');
    }

    this.lastResult = {
      round: this.duel,
      attribute: this.attribute,
      humanCard: this.played[HUMAN],
      aiCard: this.played[AI],
      winner,
      potScooped: 0,
      enteredSuddenDeath,
      suddenDeath: wasSuddenDeath,
      cycle: this.cycle,
    };
    this.log.push(this.lastResult);
    if (!this.isOver) this.phase = PHASE.REVEAL;
    return this.lastResult;
  }

  _finish(stage, reason) {
    this.finishStage = stage;
    this.finishReason = reason;
    this.phase = PHASE.GAME_OVER;
  }

  nextDuel() {
    if (this.phase !== PHASE.REVEAL) throw new Error(`Nem indítható új párbaj ebben a fázisban: ${this.phase}`);
    this.played = { [HUMAN]: null, [AI]: null };
    this.attribute = null;
    let reshuffled = false;

    if (this.hands[HUMAN].length === 0 || this.hands[AI].length === 0) {
      this.hands = {
        [HUMAN]: shuffle(this.teams[HUMAN], this.rng),
        [AI]: shuffle(this.teams[AI], this.rng),
      };
      this.used = { [HUMAN]: [], [AI]: [] };
      this.attempts = { [HUMAN]: [], [AI]: [] };
      this.cycle += 1;
      reshuffled = true;
    }

    this.chooser = this.chooser === HUMAN ? AI : HUMAN;
    this.duel += 1;
    this.phase = PHASE.CHOOSE_ATTRIBUTE;
    return { reshuffled, cycle: this.cycle };
  }

  result() {
    const human = this.scores[HUMAN];
    const ai = this.scores[AI];
    const bestCount = Math.max(0, ...Object.values(this.categoryWins));
    const bestCategories = bestCount === 0
      ? []
      : Object.entries(this.categoryWins).filter(([, count]) => count === bestCount).map(([key]) => key);
    return {
      human,
      ai,
      winner: human > ai ? HUMAN : AI,
      duels: this.log.length,
      stage: this.finishStage,
      reason: this.finishReason,
      bestCategories,
      bestCategoryWins: bestCount,
    };
  }
}

/** Lightweight opponent AI with safe handling for optional statistics. */



function buildDistribution(deck) {
  return Object.fromEntries(ATTRIBUTES.map(attribute => [
    attribute.key,
    deck
      .map(card => attributeValue(card, attribute.key))
      .filter(value => value != null)
      .sort((a, b) => a - b),
  ]));
}

function strength(card, attributeKey, distribution) {
  const attribute = ATTRIBUTE_BY_KEY[attributeKey];
  const values = distribution[attributeKey] ?? [];
  const value = attributeValue(card, attributeKey);
  if (!attribute || value == null || values.length === 0) return Number.NEGATIVE_INFINITY;

  let below = 0;
  let equal = 0;
  for (const other of values) {
    if (other < value) below += 1;
    else if (other === value) equal += 1;
  }
  const percentile = (below + equal / 2) / values.length;
  return attribute.higherWins ? percentile : 1 - percentile;
}

const DIFFICULTY = {
  pub: { noise: 0.35, sacrificeBelow: 0.30, label: 'Kicsit spicces' },
  regular: { noise: 0.15, sacrificeBelow: 0.40, label: 'Törzsvendég' },
  shark: { noise: 0.02, sacrificeBelow: 0.45, label: 'Kocsmai cápa' },
};

class OpponentAI {
  constructor(difficulty = 'regular', deck) {
    if (!Array.isArray(deck) || deck.length === 0) throw new Error('A gépnek szüksége van a játékoskeretre.');
    this.settings = DIFFICULTY[difficulty] ?? DIFFICULTY.regular;
    this.distribution = buildDistribution(deck);
  }

  strength(card, attributeKey) { return strength(card, attributeKey, this.distribution); }
  _jitter() { return (Math.random() - 0.5) * 2 * this.settings.noise; }

  chooseAttribute(hand, allowedKeys = ATTRIBUTES.map(attribute => attribute.key)) {
    let best = null;
    for (const card of hand) {
      for (const key of allowedKeys) {
        if (!hasAttributeData(card, key)) continue;
        const score = this.strength(card, key) + this._jitter();
        if (!best || score > best.score) best = { score, attribute: key, cardId: card.id };
      }
    }
    if (!best) throw new Error('A gép nem talált összehasonlítható kártyát.');
    return { attribute: best.attribute, cardId: best.cardId };
  }

  chooseCard(hand, attributeKey) {
    const eligible = hand.filter(card => hasAttributeData(card, attributeKey));
    if (eligible.length === 0) throw new Error('A gépnek nincs adatot tartalmazó kártyája ehhez a kategóriához.');

    const ranked = eligible
      .map(card => ({ card, score: this.strength(card, attributeKey) + this._jitter() }))
      .sort((a, b) => b.score - a.score);
    if (ranked[0].score >= this.settings.sacrificeBelow) return ranked[0].card.id;

    const potential = card => {
      const scores = ATTRIBUTES
        .filter(attribute => hasAttributeData(card, attribute.key))
        .map(attribute => this.strength(card, attribute.key));
      return scores.length ? Math.max(...scores) : Number.NEGATIVE_INFINITY;
    };
    return eligible.slice().sort((a, b) => potential(a) - potential(b))[0].id;
  }
}

const lastUsed = new Map();
let lastSpeaker = null;

function pick(pool, key) {
  if (!pool?.length) return null;
  const previousText = lastUsed.get(key);
  let candidates = pool.filter(([, text]) => text !== previousText);
  if (!candidates.length) candidates = pool;
  const differentSpeaker = candidates.filter(([speaker]) => speaker !== lastSpeaker);
  if (differentSpeaker.length) candidates = differentSpeaker;
  const chosen = candidates[Math.floor(Math.random() * candidates.length)];
  lastUsed.set(key, chosen[1]);
  lastSpeaker = chosen[0];
  return chosen;
}

const fill = (text, context) => text.replace(/\{(\w+)\}/g, (_, key) => context[key] ?? `{${key}}`);

function getLine(event, context = {}) {
  let pool = LINES[event];
  if (pool && !Array.isArray(pool)) pool = pool[context.attributeKey];
  const line = pick(pool, `${event}${context.attributeKey ?? ''}`);
  if (!line) return null;
  return { speaker: SPEAKERS[line[0]], text: fill(line[1], context) };
}

function getIdleChatter(chance = 0.35) {
  return Math.random() < chance ? getLine('idle') : null;
}

/** DOM rendering shared by Classic and Penalties modes. */



const EXTENSIONS = ['png', 'jpg', 'jpeg', 'webp'];
const withExtensions = base => EXTENSIONS.map(extension => `${base}.${extension}`);

const ART = {
  portrait: id => withExtensions(`assets/portraits/${id}`),
  cardBack: () => withExtensions('assets/cards/back'),
  friend: id => withExtensions(`assets/friends/${id}`),
  pub: () => withExtensions('assets/pub/background'),
};

const $ = selector => document.querySelector(selector);
const el = (tag, className, text) => {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = text;
  return node;
};

function tryArt(node, candidates, loadedClass = 'has-art', overlay = null) {
  const urls = Array.isArray(candidates) ? candidates : [candidates];
  const attempt = index => {
    if (index >= urls.length) return;
    const probe = new Image();
    probe.onload = () => {
      node.style.backgroundImage = overlay ? `${overlay}, url("${urls[index]}")` : `url("${urls[index]}")`;
      node.classList.add(loadedClass);
    };
    probe.onerror = () => attempt(index + 1);
    probe.src = urls[index];
  };
  attempt(0);
}

const PUB_SCRIM = 'linear-gradient(rgba(18,11,5,.36), rgba(18,11,5,.64))';
const initials = name => name.split(' ').filter(Boolean).map(word => word[0]).join('').slice(0, 2).toUpperCase();
const detailValue = value => typeof value === 'number' && Number.isFinite(value) ? String(value) : 'Nincs adat';

class UI {
  constructor(handlers, settings = {}) {
    this.handlers = handlers;
    this.settings = { sounds: true, commentary: true, ...settings };
    this.mode = 'classic';
    this.dom = {
      pub: $('#pub'),
      hudScores: $('#hud-scores'),
      hudMeta: $('#hud-meta'),
      hudSettings: $('#hud-settings'),
      opponentHand: $('#opponent-hand'),
      opponentPile: $('#opponent-pile'),
      playerHand: $('#player-hand'),
      playerPile: $('#player-pile'),
      prompt: $('#prompt'),
      picker: $('#attribute-picker'),
      duel: $('#duel'),
      verdict: $('#verdict'),
      pot: $('#pot-indicator'),
      feed: $('#banter-feed'),
      penaltyBoard: $('#penalty-board'),
      suddenDeath: $('#sudden-death-banner'),
      overlay: $('#overlay'),
      overlayBody: $('#overlay-body'),
    };
    tryArt(this.dom.pub, ART.pub(), 'has-art', PUB_SCRIM);
    this._renderSettings();
  }

  setMode(mode) {
    this.mode = mode;
    this.dom.pub.classList.toggle('mode-penalties', mode === 'penalties');
    this.dom.penaltyBoard.hidden = mode !== 'penalties';
    this.dom.suddenDeath.hidden = true;
  }

  setSettings(settings) {
    this.settings = { ...this.settings, ...settings };
    this._renderSettings();
  }

  _renderSettings() {
    this.dom.hudSettings.replaceChildren();
    const sound = el('button', 'icon-toggle', this.settings.sounds ? '🔊 Hang' : '🔇 Hang');
    sound.type = 'button';
    sound.setAttribute('aria-pressed', String(this.settings.sounds));
    sound.addEventListener('click', () => this.handlers.onToggleSounds?.());
    const comments = el('button', 'icon-toggle', this.settings.commentary ? '💬 Kommentár' : '🚫 Kommentár');
    comments.type = 'button';
    comments.setAttribute('aria-pressed', String(this.settings.commentary));
    comments.addEventListener('click', () => this.handlers.onToggleCommentary?.());
    this.dom.hudSettings.append(sound, comments);
  }

  resetTable() {
    this.closeInspector();
    for (const node of [this.dom.opponentHand, this.dom.playerHand, this.dom.duel, this.dom.verdict,
      this.dom.picker, this.dom.feed, this.dom.penaltyBoard]) node.replaceChildren();
    this.dom.prompt.textContent = '';
    this.dom.pot.textContent = '';
    this.dom.suddenDeath.hidden = true;
  }

  renderCard(card, opts = {}) {
    if (opts.faceDown) {
      const back = el('div', 'card card--back');
      tryArt(back, ART.cardBack());
      return back;
    }

    const node = el('article', 'card');
    node.dataset.cardId = card.id;
    const portrait = el('div', 'card__portrait');
    portrait.dataset.initials = initials(card.name);
    tryArt(portrait, [...ART.portrait(card.id), ...(card.meta?.imageUrl ? [card.meta.imageUrl] : [])]);
    if (card.position) portrait.appendChild(el('span', 'card__position', card.position));
    node.appendChild(portrait);
    node.appendChild(el('div', 'card__name', card.name));
    node.appendChild(el('div', 'card__club', [card.club, card.nation].filter(Boolean).join(' · ')));

    const stats = el('div', 'card__stats');
    for (const attribute of ATTRIBUTES) {
      const available = hasAttributeData(card, attribute.key);
      const row = el('div', `stat${attribute.key === opts.activeAttribute ? ' active' : ''}${available ? '' : ' stat--missing'}`);
      row.appendChild(el('span', 'stat__label', `${attribute.icon} ${attribute.label}`));
      row.appendChild(el('span', 'stat__value', formatAttribute(card, attribute.key)));
      stats.appendChild(row);
    }
    node.appendChild(stats);

    if (opts.onClick) {
      node.classList.add('selectable');
      node.addEventListener('click', () => opts.onClick(card));
    }
    if (opts.dimmed) node.classList.add('card--dim');
    if (opts.unavailable) {
      node.classList.add('card--unavailable');
      node.title = 'Ehhez a játékoshoz nincs adat a kiválasztott kategóriában.';
    }
    if (opts.large) node.classList.add('card--large');
    return node;
  }

  openInspector(hand, index, opts = {}) {
    this.inspector = { hand, index, opts };
    this._renderInspector();
  }

  closeInspector() {
    this.inspector = null;
    $('#inspector')?.remove();
    if (this._inspectorKeys) document.removeEventListener('keydown', this._inspectorKeys);
    this._inspectorKeys = null;
  }

  _inspectorStep(delta) {
    if (!this.inspector) return;
    this.inspector.index = (this.inspector.index + delta + this.inspector.hand.length) % this.inspector.hand.length;
    this._renderInspector();
  }

  _renderInspector() {
    const { hand, index, opts } = this.inspector;
    const card = hand[index];
    const canPlay = opts.playable && (!opts.attribute || hasAttributeData(card, opts.attribute));
    $('#inspector')?.remove();

    const layer = el('div');
    layer.id = 'inspector';
    layer.addEventListener('click', event => { if (event.target === layer) this.closeInspector(); });
    const shell = el('div', 'inspector__shell');
    const previous = el('button', 'inspector__nav', '‹');
    previous.title = 'Előző kártya';
    previous.addEventListener('click', () => this._inspectorStep(-1));
    const next = el('button', 'inspector__nav', '›');
    next.title = 'Következő kártya';
    next.addEventListener('click', () => this._inspectorStep(1));

    const centre = el('div', 'inspector__centre');
    centre.appendChild(this.renderCard(card, { activeAttribute: opts.attribute, large: true }));
    centre.appendChild(el('div', 'inspector__counter', `${index + 1}/${hand.length} kártya`));

    const details = el('div', 'inspector__details');
    details.append(
      el('span', null, `🟥 Egyenes piros / MLSZ piros: ${detailValue(card.stats.redCards)}`),
      el('span', null, `🟨🟥 Második sárga miatti kiállítás: ${detailValue(card.stats.secondYellowRedCards)}`),
    );
    centre.appendChild(details);

    const actions = el('div', 'inspector__actions');
    if (opts.playable) {
      const play = el('button', 'btn', canPlay ? 'Kijátszom ezt a lapot' : 'Nincs adat ehhez a kategóriához');
      play.disabled = !canPlay;
      play.addEventListener('click', () => {
        if (!canPlay) return;
        const chosen = hand[this.inspector.index];
        this.closeInspector();
        opts.onPlay(chosen);
      });
      actions.appendChild(play);
    }
    const close = el('button', 'btn btn--ghost', opts.playable ? 'Vissza' : 'Bezárás');
    close.addEventListener('click', () => this.closeInspector());
    actions.appendChild(close);
    centre.appendChild(actions);
    centre.appendChild(el('div', 'inspector__hint', '← → kártyaváltás · Enter kijátszás · Esc bezárás'));
    shell.append(previous, centre, next);
    layer.appendChild(shell);
    document.body.appendChild(layer);

    this._inspectorKeys = event => {
      if (!this.inspector) return;
      if (event.key === 'Escape') this.closeInspector();
      else if (event.key === 'ArrowLeft') this._inspectorStep(-1);
      else if (event.key === 'ArrowRight') this._inspectorStep(1);
      else if (event.key === 'Enter') {
        const current = this.inspector.hand[this.inspector.index];
        const playable = this.inspector.opts.playable
          && (!this.inspector.opts.attribute || hasAttributeData(current, this.inspector.opts.attribute));
        if (playable) {
          const onPlay = this.inspector.opts.onPlay;
          this.closeInspector();
          onPlay(current);
        }
      }
    };
    document.addEventListener('keydown', this._inspectorKeys);
  }

  renderHands(game, { selectable = false, inspectAttribute = null } = {}) {
    this.dom.opponentHand.replaceChildren(
      ...game.hands[AI].map(() => this.renderCard(null, { faceDown: true }))
    );
    const hand = game.hands[HUMAN];
    const attribute = game.attribute ?? inspectAttribute;
    this.dom.playerHand.replaceChildren(...hand.map((card, index) => {
      const unavailable = Boolean(attribute) && !hasAttributeData(card, attribute);
      return this.renderCard(card, {
        activeAttribute: attribute,
        dimmed: !selectable || unavailable,
        unavailable,
        onClick: () => this.openInspector(hand, index, {
          attribute,
          playable: selectable,
          onPlay: chosen => this.handlers.onCard(chosen),
        }),
      });
    }));
  }

  renderScores(game) {
    if (game.mode === 'penalties') this._renderPenaltyScores(game);

  }

  _renderClassicScores(game) {
    const { [HUMAN]: human, [AI]: ai } = game.scores;
    this.dom.hudScores.replaceChildren(
      this._scoreChip('Játékos', human, human > ai),
      this._scoreChip('Gép', ai, ai > human),

    this._renderPiles(human, ai);
    this.dom.pot.textContent = game.pot.length ? `🃏 ${game.pot.length} lap a döntetlenpakliban` : '';
  }

  _renderPenaltyScores(game) {
    const human = game.scores[HUMAN];
    const ai = game.scores[AI];
    const score = el('div', 'penalty-score', `JÁTÉKOS ${human}–${ai} GÉP`);
    this.dom.hudScores.replaceChildren(score);
    this.dom.hudMeta.textContent = game.suddenDeath
      ? `Hirtelen halál · ${game.log.length} lejátszott párbaj`

      const marks = el('div', 'attempt-marks');
      for (let index = 0; index < 11; index += 1) {
        const outcome = game.attempts[side][index];

        const marker = el('span', `attempt attempt--${outcome ?? 'empty'}`, symbol);
        marker.title = outcome === 'win' ? 'Megnyert párbaj' : outcome === 'loss' ? 'Elveszített párbaj' : outcome === 'tie' ? 'Döntetlen' : 'Hátralévő lap';
        marks.appendChild(marker);
      }
      wrapper.appendChild(marks);
      return wrapper;
    };
    this.dom.penaltyBoard.replaceChildren(row(HUMAN), row(AI));
  }

  _renderPiles(human, ai) {
    this.dom.playerPile.replaceChildren(el('span', 'pile__label', this.mode === 'penalties' ? 'Használt lapok' : 'Megnyert lapok'), document.createTextNode(human ? ` ${human}` : ''));

    this.dom.playerPile.classList.toggle('filled', human > 0);

  showAttributePicker(game) {

    const attribute = game.attribute;

    mine.append(el('div', 'duel-slot__who', 'Játékos'), game.played[HUMAN]

    const theirs = el('div', 'duel-slot');

      ? this.renderCard(null, { faceDown: true }) : this.renderCard(game.played[AI], { activeAttribute: attribute }));

    if (result?.winner === AI) { theirs.classList.add('winner'); mine.classList.add('loser'); }
    this.dom.duel.replaceChildren(mine, el('div', 'versus', 'VS'), theirs);
  }

  _emptySlot() {
    const slot = el('div', 'card card--empty');

  showVerdict(result, game) {
    const attribute = ATTRIBUTE_BY_KEY[result.attribute];
    const detail = `${attribute.icon} ${attribute.label}: ${formatAttribute(result.humanCard, result.attribute)} – ${formatAttribute(result.aiCard, result.attribute)}`;
    const node = this.dom.verdict;

    if (result.winner === 'tie') {
