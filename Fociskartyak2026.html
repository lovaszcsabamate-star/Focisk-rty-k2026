    } else if (result.winner === HUMAN) {
      node.className = 'win';
      const pot = result.potScooped ? ` · +${result.potScooped} lap a döntetlenpakliból` : '';
      node.append(isPenalty ? 'GÓL A JÁTÉKOSNAK' : 'A TIÉD A KÖR', el('small', null, detail + pot));
      this.playSound('win');
    } else {
      node.className = 'lose';
      const pot = result.potScooped ? ` · +${result.potScooped} lap a döntetlenpakliból` : '';
      node.append(isPenalty ? 'GÓL A GÉPNEK' : 'A GÉPÉ A KÖR', el('small', null, detail + pot));
      this.playSound('loss');
    }
  }

  async showSuddenDeath() {
    this.dom.suddenDeath.hidden = false;
    this.dom.suddenDeath.textContent = '⚠ HIRTELEN HALÁL ⚠';
    this.playSound('sudden');
    await new Promise(resolve => setTimeout(resolve, 1200));
    this.dom.suddenDeath.hidden = true;
  }

  say(line) {
    if (!line || !this.settings.commentary) return;
    const bubble = el('div', 'bubble');
    const avatar = el('div', 'avatar', line.speaker.name[0]);
    avatar.style.background = line.speaker.colour;
    tryArt(avatar, ART.friend(line.speaker.id));
    const body = el('div', 'bubble__body');
    const name = el('div', 'bubble__name', line.speaker.name);
    name.style.color = line.speaker.colour;
    body.append(name, el('div', 'bubble__text', line.text));
    bubble.append(avatar, body);
    this.dom.feed.appendChild(bubble);
    this.dom.feed.scrollTop = this.dom.feed.scrollHeight;
    while (this.dom.feed.children.length > 40) this.dom.feed.firstChild.remove();
  }

  playSound(kind) {
    if (!this.settings.sounds) return;
    try {
      this.audioContext ??= new (window.AudioContext || window.webkitAudioContext)();
      const context = this.audioContext;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const frequencies = { win: 520, loss: 160, tie: 280, sudden: 110 };
      oscillator.frequency.value = frequencies[kind] ?? 320;
      oscillator.type = kind === 'sudden' ? 'sawtooth' : 'triangle';
      gain.gain.setValueAtTime(0.0001, context.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.08, context.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + (kind === 'sudden' ? 0.55 : 0.22));
      oscillator.connect(gain).connect(context.destination);
      oscillator.start();
      oscillator.stop(context.currentTime + (kind === 'sudden' ? 0.6 : 0.25));
    } catch {
      // Audio is an optional enhancement; blocked browser audio never blocks play.
    }
  }

  showOverlay(node) {
    this.dom.overlayBody.replaceChildren(node);
    this.dom.overlay.hidden = false;
  }

  hideOverlay() { this.dom.overlay.hidden = true; }
}

UI.prototype._uxEnsureStepper = function _uxEnsureStepper() {
  let steps = this.dom.prompt?.parentElement?.querySelector('.game-steps');
  if (steps) return steps;

  steps.setAttribute('aria-label', 'A kör lépései');
  ['1. Kategória', '2. Kártya', '3. Eredmény'].forEach((label, index) => {
    const item = el('span', 'game-step', label);
    item.dataset.step = String(index + 1);
    steps.appendChild(item);
  });

  const felt = this.dom.prompt?.parentElement;
  if (felt) felt.insertBefore(steps, this.dom.prompt);
  return steps;
};

UI.prototype._uxSetStep = function _uxSetStep(activeStep = 0) {
  const steps = this._uxEnsureStepper();
  steps.hidden = activeStep === 0;
  steps.querySelectorAll('.game-step').forEach(item => {
    const step = Number(item.dataset.step);
    item.classList.toggle('is-active', step === activeStep);
    item.classList.toggle('is-complete', step < activeStep);
    if (step === activeStep) item.setAttribute('aria-current', 'step');
    else item.removeAttribute('aria-current');
  });
};

UI.prototype.renderCard = function renderFriendlyCard(card, opts = {}) {
  if (opts.faceDown) return originals.renderCard.call(this, card, opts);

  const directPlay = typeof opts.onClick === 'function' ? opts.onClick : null;
  const inspect = typeof opts.onInspect === 'function' ? opts.onInspect : null;
  const node = originals.renderCard.call(this, card, { ...opts, onClick: undefined });

  // Unknown fields do not consume valuable card space.
  node.querySelectorAll('.stat--missing').forEach(row => row.remove());

  // The currently compared statistic is always the first visible row.
  const active = node.querySelector('.stat.active');
  const stats = node.querySelector('.card__stats');
  if (active && stats?.firstElementChild !== active) stats.prepend(active);

  if (inspect) {
    const button = el('button', 'card__inspect', '🔍');
    button.type = 'button';
    button.title = `${card.name} részletei`;
    button.setAttribute('aria-label', `${card.name} részleteinek megnyitása`);
    button.addEventListener('click', event => {
      event.stopPropagation();
      inspect(card);
    });
    node.appendChild(button);
  }

  const activate = event => {
    if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') return;
    if (event.type === 'keydown') event.preventDefault();
    if (event.target.closest?.('.card__inspect')) return;
    if (directPlay) directPlay(card);
    else inspect?.(card);
  };

  if (directPlay || inspect) {
    node.tabIndex = 0;
    node.setAttribute('role', 'button');
    node.addEventListener('click', activate);
    node.addEventListener('keydown', activate);
  }

  if (directPlay) {
    node.classList.add('selectable', 'card--direct-play');
    node.title = `${card.name} kijátszása`;
    node.setAttribute('aria-label', `${card.name} kijátszása. A nagyítóval a részletek nyithatók meg.`);
  } else if (inspect) {
    node.classList.add('card--inspectable');
    node.setAttribute('aria-label', `${card.name} részleteinek megnyitása`);
  }

  return node;
};

UI.prototype.renderHands = function renderFriendlyHands(game, { selectable = false, inspectAttribute = null } = {}) {
  this.dom.opponentHand.replaceChildren(
    ...game.hands[AI].map(() => this.renderCard(null, { faceDown: true }))
  );

  const hand = game.hands[HUMAN];
  const attribute = game.attribute ?? inspectAttribute;
  this.dom.playerHand.replaceChildren(...hand.map((card, index) => {
    const unavailable = Boolean(attribute) && !hasAttributeData(card, attribute);
    const inspect = () => this.openInspector(hand, index, {
      attribute,
      playable: selectable,
      onPlay: chosen => this.handlers.onCard(chosen),
    });

    return this.renderCard(card, {
      activeAttribute: attribute,
      dimmed: !selectable || unavailable,
      unavailable,
      onClick: selectable && !unavailable ? () => this.handlers.onCard(card) : null,
      onInspect: inspect,
    });
  }));

  if (selectable) this._uxSetStep(2);

  // The chooser may revise the category until a card has actually been played.
  if (selectable && inspectAttribute) {
    const change = el('button', 'btn btn--ghost ux-change-attribute', '↩ Másik kategória');
    change.type = 'button';
    change.addEventListener('click', () => this.showAttributePicker(game));
    this.dom.picker.replaceChildren(change);
  }
};

UI.prototype.showVerdict = function showFriendlyVerdict(result, game) {
  const attribute = ATTRIBUTE_BY_KEY[result.attribute];
  const humanValue = formatAttribute(result.humanCard, result.attribute);
  const aiValue = formatAttribute(result.aiCard, result.attribute);
  const symbol = comparisonSymbol(attribute, result.winner);
  const detail = `${attribute.icon} ${attribute.label}: ${humanValue} ${symbol} ${aiValue}`;
  const node = this.dom.verdict;
  const isPenalty = game.mode === 'penalties';
  const pot = result.potScooped ? ` · +${result.potScooped} lap a döntetlenpakliból` : '';

  node.replaceChildren();
  if (result.winner === 'tie') {
    node.className = 'tie';
    node.append('DÖNTETLEN', el('small', null, `${detail}${isPenalty ? ' · nincs gól' : ' · a lapok az asztalon maradnak'}`));
    this.playSound('tie');
  } else if (result.winner === HUMAN) {
    node.className = 'win';
    node.append(isPenalty ? 'GÓL A JÁTÉKOSNAK' : 'A TIÉD A KÖR', el('small', null, detail + pot));
    this.playSound('win');
  } else {
    node.className = 'lose';
    node.append(isPenalty ? 'GÓL A GÉPNEK' : 'A GÉPÉ A KÖR', el('small', null, detail + pot));
    this.playSound('loss');
  }

  this._uxSetStep(3);
  this._uxRecordResult(result);
};

UI.prototype._uxRecordResult = function recordResult(result) {
  this.uxStats ??= {
    rounds: 0, humanWins: 0, aiWins: 0, ties: 0,
    categoryWins: {}, playerWins: {}, biggestWin: null, closestDuel: null,
  };
  const stats = this.uxStats;
  stats.rounds += 1;

  if (result.winner === 'tie') {
    stats.ties += 1;
    return;
  }

  const humanMetric = metricValue(result.humanCard, result.attribute);
  const aiMetric = metricValue(result.aiCard, result.attribute);
  const margin = humanMetric == null || aiMetric == null ? null : Math.abs(humanMetric - aiMetric);
  const summary = `${displayCategory(result.attribute)}: ${formatAttribute(result.humanCard, result.attribute)}–${formatAttribute(result.aiCard, result.attribute)}`;

  if (result.winner === HUMAN) {
    stats.humanWins += 1;
    stats.categoryWins[result.attribute] = (stats.categoryWins[result.attribute] ?? 0) + 1;
    stats.playerWins[result.humanCard.name] = (stats.playerWins[result.humanCard.name] ?? 0) + 1;
    if (margin != null && (!stats.biggestWin || margin > stats.biggestWin.margin)) {
      stats.biggestWin = { margin, summary, card: result.humanCard.name };
    }
  } else {
    stats.aiWins += 1;
  }

  if (margin != null && (!stats.closestDuel || margin < stats.closestDuel.margin)) {
    stats.closestDuel = { margin, summary };
  }
};

UI.prototype.showOverlay = function showFriendlyOverlay(node) {
  // The separate penalty introduction duplicated the information from the main
  // menu. Start immediately after the user presses the main start button.
  if (node.classList?.contains('penalty-intro')) {
    node.querySelector('#kickoff-btn')?.click();
    return;
  }

  const penaltyMode = node.querySelector?.('input[value="penalties"]')?.closest('.mode-card');
  if (penaltyMode) {
    const title = penaltyMode.querySelector('b');
    const description = penaltyMode.querySelector('small');
    if (title) title.textContent = '⚽ Tizenegyes mód';
    if (description) description.textContent = '11–11 lap, öt rendes párbaj, döntetlennél hirtelen halál.';
    const rules = node.querySelector('[data-rules="penalties"]');
    if (rules) rules.innerHTML = '<b>Tizenegyes szabály:</b> 11 lap. Öt rendes párbaj. Döntetlennél hirtelen halál; azonos értéknél nincs gól.';
  }

  // Add a useful match summary to the classic result screen.
  if (node.classList?.contains('result-panel') && !node.querySelector('.result-stats') && this.uxStats?.rounds) {
    const stats = this.uxStats;
    const bestCategory = Object.entries(stats.categoryWins).sort((a, b) => b[1] - a[1])[0];
    const bestPlayer = Object.entries(stats.playerWins).sort((a, b) => b[1] - a[1])[0];
    const list = el('dl', 'result-stats ux-result-stats');
    const add = (label, value) => {
      const row = el('div');
      row.append(el('dt', null, label), el('dd', null, value));
      list.appendChild(row);
    };

    add('Lejátszott körök', String(stats.rounds));
    add('Megnyert körök', String(stats.humanWins));
    add('Legjobb kategória', bestCategory ? `${displayCategory(bestCategory[0])} (${bestCategory[1]})` : 'Nem volt megnyert kategória');
    add('Legeredményesebb játékos', bestPlayer ? `${bestPlayer[0]} (${bestPlayer[1]} kör)` : 'Nem volt megnyert lap');
    add('Legnagyobb győzelem', stats.biggestWin ? `${stats.biggestWin.card} · ${stats.biggestWin.summary}` : '—');
    add('Legszorosabb párbaj', stats.closestDuel?.summary ?? '—');
    node.querySelector('.result-actions')?.before(list);
  }

  originals.showOverlay.call(this, node);
};

      picker.classList.toggle('has-next-action', Boolean(onlyButton?.textContent.includes('Következő')));

      <button class="pwa-install-guide__close" type="button" aria-label="Bezárás">×</button>
      <div class="pwa-install-guide__icon">⚽</div>
      <h2 id="pwa-install-title">Telepítsd a Fociskártyákat</h2>
      <p>${pwaIsIos
        ? 'Nyisd meg Safariban, koppints a Megosztás gombra, majd válaszd a „Főképernyőhöz adás” lehetőséget.'
        : 'Nyisd meg a böngésző menüjét, majd válaszd az „Alkalmazás telepítése” vagy a „Hozzáadás a kezdőképernyőhöz” lehetőséget.'}</p>
      <ol>
        <li>A játék ikonja megjelenik a telefonodon.</li>
        <li>Teljes képernyőn, böngészősáv nélkül indul.</li>
        <li>Az első betöltés után internet nélkül is játszható.</li>
      </ol>
      <button class="btn pwa-install-guide__done" type="button">Értem</button>
    </section>`;
  layer.addEventListener('click', event => {
    if (event.target === layer || event.target.closest('.pwa-install-guide__close, .pwa-install-guide__done')) {
      pwaCloseGuide();
    }
  });
  document.body.appendChild(layer);
}

async function pwaInstall() {
  if (pwaState.deferredPrompt) {
    const promptEvent = pwaState.deferredPrompt;
    pwaState.deferredPrompt = null;
    promptEvent.prompt();
    const choice = await promptEvent.userChoice;
    if (choice.outcome !== 'accepted') pwaEnsureInstallButton();
    return;
  }
  pwaShowGuide();
}

function pwaEnsureInstallButton() {
  const host = document.querySelector('#hud-settings');
  if (!host || pwaState.installed || !pwaCanRun || !pwaIsMobile) return;
  if (host.querySelector('[data-pwa-install]')) return;

  const button = document.createElement('button');
  button.type = 'button';
  button.className = 'icon-toggle pwa-install-button';
  button.dataset.pwaInstall = 'true';
  button.textContent = '⬇ Telepítés';
  button.title = 'Játék telepítése a telefonra';
  button.addEventListener('click', pwaInstall);
  host.appendChild(button);
}

if (pwaCanRun && 'serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(error => {
      console.warn('A mobiljáték offline módja nem indult el:', error);
    });
  });
}

window.addEventListener('beforeinstallprompt', event => {
  event.preventDefault();
  pwaState.deferredPrompt = event;
  pwaEnsureInstallButton();
});

window.addEventListener('appinstalled', () => {
  pwaState.installed = true;
  pwaState.deferredPrompt = null;
  document.querySelector('[data-pwa-install]')?.remove();
  pwaCloseGuide();
});

const pwaSettingsObserver = new MutationObserver(() => pwaEnsureInstallButton());
const pwaStart = () => {
  const host = document.querySelector('#hud-settings');
  if (host) pwaSettingsObserver.observe(host, { childList: true });
  pwaEnsureInstallButton();
};

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', pwaStart, { once: true });
else pwaStart();


/* ===== js/main.js ===== */
/** Browser session controller for Classic and Penalties modes. */







const wait = milliseconds => new Promise(resolve => setTimeout(resolve, milliseconds));

const loadSetting = (key, fallback) => {
  try {
    const value = localStorage.getItem(`fociskartyak:${key}`);
    return value == null ? fallback : value === 'true';
  } catch { return fallback; }
};

class Session {
  constructor(deck, source, meta) {
    this.deck = deck;
    this.source = source;
    this.meta = meta;
    this.settings = {
      sounds: loadSetting('sounds', true),
      commentary: loadSetting('commentary', true),
    };
    this.ui = new UI({
      onAttribute: key => this.humanChoseAttribute(key),
      onCard: card => this.humanPlayedCard(card),
      onToggleSounds: () => this.toggleSetting('sounds'),
      onToggleCommentary: () => this.toggleSetting('commentary'),
    }, this.settings);
    this.busy = false;
    this.showTitleScreen();
  }

  toggleSetting(key, forcedValue) {
    this.settings[key] = forcedValue ?? !this.settings[key];
    try { localStorage.setItem(`fociskartyak:${key}`, String(this.settings[key])); } catch { /* optional */ }
    this.ui.setSettings(this.settings);
  }

  showTitleScreen() {
    this.busy = false;
    this.game = null;
    this.ui.setMode('classic');
    this.ui.resetTable();
    const panel = el('div', 'menu-panel');
    panel.innerHTML = `
      <p class="eyebrow">A hátsó asztal bajnoksága</p>
      <h1>Fociskártyák 2026</h1>
      <p>A shady alak már leült. Válassz játékmódot, mielőtt elfogy a söre.</p>

      <div class="mode-picker" role="radiogroup" aria-label="Játékmód">
        <label class="mode-card">
          <input type="radio" name="mode" value="classic" checked>
          <span><b>🃏 Klasszikus mód</b><small>52 lap, körönkénti összehasonlítás, a győztes viszi a lapokat.</small></span>
        </label>
        <label class="mode-card">
          <input type="radio" name="mode" value="penalties">
          <span><b>⚽ Penalties mód</b><small>11–11 lap, 5 rendes párbaj, döntetlennél hirtelen halál.</small></span>
        </label>
      </div>

      <div class="rules" data-rules="classic">
        <b>Klasszikus szabály:</b> ${Math.min(GAME_DECK_SIZE, this.deck.length)} véletlenszerű lap kerül játékba.
        A kör győztese viszi a két lapot és a döntetlenpaklit, majd ő választ új kategóriát.
      </div>
      <div class="rules" data-rules="penalties" hidden>
        <b>Penalties szabály:</b> 11 lap. 5 rendes párbaj. Döntetlennél hirtelen halál.
        Egy párbaj egy gól; azonos értéknél nincs pont.
      </div>

      <div class="difficulty" aria-label="Nehézség">
        ${Object.entries(DIFFICULTY).map(([key, difficulty], index) => `
          <label><input type="radio" name="difficulty" value="${key}" ${index === 1 ? 'checked' : ''}><span>${difficulty.label}</span></label>
        `).join('')}
      </div>

      <div class="menu-toggles">
        <label><input type="checkbox" id="sound-setting" ${this.settings.sounds ? 'checked' : ''}> 🔊 Hangok</label>
        <label><input type="checkbox" id="commentary-setting" ${this.settings.commentary ? 'checked' : ''}> 💬 Kommentárok</label>
      </div>
      <button class="btn" id="start-btn">Játék indítása</button>
      <div class="deck-source">${this._deckLabel()}</div>
    `;

    const updateRules = () => {
      const mode = panel.querySelector('input[name=mode]:checked').value;
      panel.querySelectorAll('[data-rules]').forEach(node => { node.hidden = node.dataset.rules !== mode; });
    };
    panel.querySelectorAll('input[name=mode]').forEach(input => input.addEventListener('change', updateRules));
    panel.querySelector('#sound-setting').addEventListener('change', event => this.toggleSetting('sounds', event.target.checked));
    panel.querySelector('#commentary-setting').addEventListener('change', event => this.toggleSetting('commentary', event.target.checked));
    panel.querySelector('#start-btn').addEventListener('click', () => {
      const mode = panel.querySelector('input[name=mode]:checked').value;
      const difficulty = panel.querySelector('input[name=difficulty]:checked').value;
      this.start(mode, difficulty);
    }, { once: true });
    this.ui.showOverlay(panel);
  }

  _deckLabel() {
    if (this.source !== 'real') return '⚠ Fiktív tartalékpakli – a valós adatfájl nem töltődött be.';
    const exact = this.meta?.selection?.exactBirthDates;
    const dateNote = Number.isFinite(exact) ? ` · ${exact} pontos születési dátum` : '';
    return `✓ ${this.deck.length} valós NB I-kártya · ${this.meta?.season ?? '2025/26'}${dateNote}`;
  }

  start(mode, difficulty) {
    this.mode = mode;
    this.difficulty = difficulty;
    this.busy = false;
    this.pendingAttribute = null;
    this.awaitingChooserCard = false;
    this.ui.resetTable();
    this.ui.setMode(mode);
    this.game = mode === 'penalties'
      ? new PenaltyGame({ players: this.deck })
      : new Game({ players: this.deck });
    const aiDeck = mode === 'penalties'
      ? [...this.game.teams[HUMAN], ...this.game.teams[AI]]
      : this.game.players;
    this.ai = new OpponentAI(difficulty, aiDeck);

    if (mode === 'penalties') this.showPenaltyIntro();
    else this._beginMatch();
  }

  showPenaltyIntro() {
    const panel = el('div', 'penalty-intro');
    panel.innerHTML = `
      <p class="eyebrow">Penalties mód</p>
      <h1>11 lap. 5 rendes párbaj.</h1>
      <p>Döntetlennél hirtelen halál. A felhasznált lapok külön pakliba kerülnek.</p>
      <button class="btn" id="kickoff-btn">Kezdődhet</button>
    `;
    panel.querySelector('#kickoff-btn').addEventListener('click', () => this._beginMatch(), { once: true });
    this.ui.showOverlay(panel);
  }

  _beginMatch() {
    this.ui.hideOverlay();
    this.ui.say(getLine('gameStart'));
    this.beginRound();
  }

  beginRound() {
    const game = this.game;
    this.ui.closeInspector();
    this.ui.renderScores(game);
    this.ui.dom.duel.replaceChildren();
    this.ui.dom.verdict.replaceChildren();
    this.ui.dom.verdict.className = '';

    if (game.chooser === HUMAN) {
      this.ui.renderHands(game, { selectable: false });
      this.ui.showAttributePicker(game);
    } else {
      this.aiChoosesAttribute();
    }
  }

  humanChoseAttribute(attributeKey) {
    if (this.busy || !this.game.availableAttributeKeys().includes(attributeKey)) return;
    this.pendingAttribute = attributeKey;
    this.ui.hideAttributePicker();
    this.ui.say(getLine('youChooseAttribute', { attributeKey }));
    this.ui.setPrompt('Válassz kártyát:', ATTRIBUTE_BY_KEY[attributeKey].label);
    this.ui.renderHands(this.game, { selectable: true, inspectAttribute: attributeKey });
    this.awaitingChooserCard = true;
  }

  async aiChoosesAttribute() {
    const game = this.game;
    this.busy = true;
    this.ui.renderHands(game, { selectable: false });
    this.ui.setPrompt('A gép gondolkodik…');
    await wait(550);
    if (this.game !== game) return;

    const choice = this.ai.chooseAttribute(game.hands[AI], game.availableAttributeKeys());
    game.chooseAttribute(choice.attribute, choice.cardId);
    const label = ATTRIBUTE_BY_KEY[choice.attribute].label;
    this.ui.say(getLine('aiChooseAttribute', { attr: label, attributeKey: choice.attribute }));
    this.ui.setPrompt('A gép választása:', label);
    this.ui.showDuel(game, { opponentHidden: true });
    this.ui.renderHands(game, { selectable: true });
    this.awaitingChooserCard = false;
    this.busy = false;
  }

  async humanPlayedCard(card) {
    if (this.busy || !this.game || this.game.phase === PHASE.GAME_OVER) return;
    this.busy = true;
    let result;

    if (this.awaitingChooserCard) {
      this.game.chooseAttribute(this.pendingAttribute, card.id);
      this.awaitingChooserCard = false;
      this.ui.showDuel(this.game, { opponentHidden: true });
      this.ui.renderHands(this.game, { selectable: false });
      this.ui.setPrompt('A gép kártyát választ…');
      await wait(500);
      const aiCardId = this.ai.chooseCard(this.game.hands[AI], this.game.attribute);
      result = this.game.playCard(AI, aiCardId);
    } else {
      result = this.game.playCard(HUMAN, card.id);
      this.ui.renderHands(this.game, { selectable: false });
      await wait(250);
    }
    await this.revealAndScore(result);
  }

  async revealAndScore(result) {
    this.ui.showDuel(this.game, { result });
    this.ui.setPrompt('');
    await wait(320);
    this.ui.showVerdict(result, this.game);
    this.ui.renderScores(this.game);
    this.sayResultBanter(result);

    if (result.enteredSuddenDeath) {
      this.ui.say(getLine('suddenDeath'));
      await this.ui.showSuddenDeath();
    } else {
      await wait(850);
    }

    if (this.game.isOver) {
      this.showGameOver();
      return;
    }
    this.busy = false;
    this.showContinue();
  }

  sayResultBanter(result) {
    const attribute = ATTRIBUTE_BY_KEY[result.attribute];
    const context = { card: result.humanCard.name, stat: attribute.label, attributeKey: result.attribute };
    if (result.winner === 'tie') {
      this.ui.say(getLine('tie', context));
      return;
    }

    const mine = attributeValue(result.humanCard, result.attribute);
    const theirs = attributeValue(result.aiCard, result.attribute);
    const spread = Math.abs(mine - theirs) / Math.max(Math.abs(mine), Math.abs(theirs), 1);
    if (result.winner === HUMAN) {
      this.ui.say(getLine('attributeWin', context));
      this.ui.say(getLine(spread > 0.55 ? 'youWinBig' : 'youWin', context));
    } else {
      this.ui.say(getLine(spread < 0.06 ? 'youLoseClose' : 'youLose', context));
    }
    if (result.potScooped > 0) this.ui.say(getLine('potScooped', context));
  }

  showContinue() {
    const label = this.mode === 'penalties' ? 'Következő párbaj' : 'Következő kör';
    const button = el('button', 'btn', label);
    button.addEventListener('click', () => {
      if (this.busy) return;
      this.busy = true;
      this.ui.dom.picker.replaceChildren();
      if (this.mode === 'penalties') {
        const { reshuffled } = this.game.nextDuel();
        if (reshuffled) this.ui.say(getLine('reshuffle'));
      } else {
        this.game.nextRound();
        this.ui.say(getIdleChatter());
      }
      this.busy = false;
      if (this.game.isOver) this.showGameOver();
      else this.beginRound();
    }, { once: true });
    this.ui.dom.picker.replaceChildren(button);
  }

  showGameOver() {
    this.busy = true;
    const result = this.game.result();
    const won = result.winner === HUMAN;
    this.ui.say(getLine(won ? 'gameOverWin' : result.winner === AI ? 'gameOverLose' : 'gameOverTie'));
    const panel = el('div', `result-panel ${won ? 'result-panel--win' : 'result-panel--loss'}`);

    if (this.mode === 'penalties') {
      const best = result.bestCategories.length
        ? result.bestCategories.map(key => `${ATTRIBUTE_BY_KEY[key].icon} ${ATTRIBUTE_BY_KEY[key].label}`).join(', ')
        : 'Nem volt megnyert kategória';
      panel.innerHTML = `
        <p class="result-kicker">${result.stage === 'hirtelen halál' ? '⚠ Hirtelen halál' : '⏱ Rendes játékidő'}</p>
        <h1>${won ? 'GYŐZELEM' : 'VERESÉG'}</h1>
        <div class="final-score">JÁTÉKOS ${result.human}–${result.ai} GÉP</div>
        <dl class="result-stats">
          <div><dt>Felhasznált párbajok</dt><dd>${result.duels}</dd></div>
          <div><dt>Eldőlt</dt><dd>${result.stage}</dd></div>
          <div><dt>Legeredményesebb kategória</dt><dd>${best}${result.bestCategoryWins ? ` (${result.bestCategoryWins} gól)` : ''}</dd></div>
        </dl>
        <div class="result-actions"><button class="btn" id="rematch-btn">Visszavágó</button><button class="btn btn--ghost" id="menu-btn">Vissza a főmenübe</button></div>
      `;
    } else {
      const heading = result.winner === HUMAN ? 'GYŐZELEM' : result.winner === AI ? 'VERESÉG' : 'DÖNTETLEN';
      panel.innerHTML = `
        <h1>${heading}</h1>
        <div class="final-score">JÁTÉKOS ${result.human}–${result.ai} GÉP</div>
        ${result.undecided ? `<p>${result.undecided} lap a döntetlenpakliban maradt.</p>` : ''}
        <div class="result-actions"><button class="btn" id="rematch-btn">Visszavágó</button><button class="btn btn--ghost" id="menu-btn">Vissza a főmenübe</button></div>
      `;
    }

    panel.querySelector('#rematch-btn').addEventListener('click', () => this.start(this.mode, this.difficulty), { once: true });
    panel.querySelector('#menu-btn').addEventListener('click', () => this.showTitleScreen(), { once: true });
    this.ui.showOverlay(panel);
  }
}

const { players, source, meta } = await loadPlayers();
new Session(players, source, meta);
</script>
