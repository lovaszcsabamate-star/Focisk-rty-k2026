<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Telepíthető magyar NB I 2025/26 fociskártya-játék klasszikus és büntetőpárbaj móddal.">
  <meta name="theme-color" content="#2a1c12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fociskártyák">
  <title>Fociskártyák 2026</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ux.css">
  <link rel="stylesheet" href="css/matchday.css">
  <link rel="stylesheet" href="css/opponents.css">
  <link rel="stylesheet" href="css/pwa.css">
  <link rel="stylesheet" href="css/mobile-experience.css">
  <link rel="stylesheet" href="css/mobile-overlay-fix.css">
  <link rel="stylesheet" href="css/player-profile.css">
  <link rel="stylesheet" href="css/focus-experience.css">
  <link rel="stylesheet" href="css/mobile-selection-fix.css">
  <link rel="stylesheet" href="css/duel-emphasis.css">
  <link rel="stylesheet" href="css/phase-refinements.css">
  <link rel="stylesheet" href="css/visual-system.css">
  <link rel="stylesheet" href="css/legal-ui.css">
</head>
<body>
  <div id="app-loading" role="status" aria-live="polite">
    <div class="app-loading__card">
      <span class="app-loading__ball" aria-hidden="true">⚽</span>
      <h1>Fociskártyák 2026</h1>
      <p>Játékosadatok és kártyák előkészítése…</p>
    </div>
  </div>

  <!-- ART: only license-approved backgrounds may be applied to #pub. -->
  <div id="pub">

    <main id="table">

      <header id="hud">
        <div class="title">Fociskártyák 2026</div>
        <div class="score-strip" id="hud-scores"></div>
        <div class="meta" id="hud-meta"></div>
        <div class="hud-settings" id="hud-settings"></div>
      </header>

      <!-- Opponent: face-down hand + victory pile -->
      <section class="zone" id="opponent-zone">
        <div class="pile" id="opponent-pile"><span class="pile__label">Gép nyereménye</span></div>
        <div class="hand hand--opponent" id="opponent-hand"></div>
      </section>

      <!-- The table itself -->
      <section id="felt">
        <div id="sudden-death-banner" hidden></div>
        <div id="penalty-board" hidden></div>
        <div id="pot-indicator"></div>
        <div id="prompt"></div>
        <div id="duel"></div>
        <div id="verdict"></div>
        <div id="attribute-picker"></div>
      </section>

      <!-- Player: hand + victory pile -->
      <section class="zone" id="player-zone">
        <div class="pile" id="player-pile"><span class="pile__label">Megnyert lapok</span></div>
        <div class="hand" id="player-hand"></div>
      </section>

    </main>

    <!-- Kocsmai kommentár -->
    <aside id="banter">
      <h2>A hátsó asztal</h2>
      <div id="banter-feed"></div>
    </aside>

  </div>

  <div id="overlay" hidden>
    <div class="panel" id="overlay-body"></div>
  </div>

  <script type="module" src="js/branding.js"></script>
  <script type="module" src="js/ux.js"></script>
  <script type="module" src="js/ux-fixes.js"></script>
  <script type="module" src="js/matchday.js"></script>
  <script type="module" src="js/opponents.js"></script>
  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/player-profile.js"></script>
  <script type="module" src="js/reliability-fixes.js"></script>
  <script type="module" src="js/usability-fixes.js"></script>
  <script type="module" src="js/focus-experience.js"></script>
  <script type="module" src="js/visual-system.js"></script>
  <script type="module" src="js/legal-ui.js"></script>
  <script type="module" src="js/bootstrap.js"></script>
</body>
</html>
